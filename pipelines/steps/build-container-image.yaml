parameters:
  - name: directory
    type: string

  - name: dockerFile
    type: string

  - name: imageName
    type: string

  - name: tagName
    type: string
    default: ' '

steps:
  - task: AzureCLI@2
    displayName: Build and Push Container Image
    inputs:
      azureSubscription: $(serviceConnection)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        if [[ -n  "${{ parameters.tagName }}"; then
          TAG_NAME="${{ parameters.tagName }}"
        else
          TAG_NAME="$(Build.BuildNumber)"
        fi

        az acr login --name "$(acrName)" --subscription "$(subscriptionName)"
        docker build --platform=linux/amd64 --tag "${{ parameters.imageName }}:${TAG_NAME}" --file "${{ parameters.dockerFile }}" "${{ parameters.directory }}" --build-arg IMAGE_ACR="$(acrLoginServer)"
        docker tag "${{ parameters.imageName }}:${TAG_NAME}" "$(acrLoginServer)/ipaffs/${{ parameters.imageName }}:${TAG_NAME}"
        docker push "$(acrLoginServer)/ipaffs/${{ parameters.imageName }}:${TAG_NAME}"
