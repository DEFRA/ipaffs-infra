parameters:
  - name: directory
    type: string

  - name: dockerFile
    type: string

  - name: imageName
    type: string

  - name: acrName
    type: string
    default: ' '

  - name: acrSubscriptionName
    type: string
    default: ' '

  - name: tagName
    type: string
    default: ' '

steps:
  - task: AzureCLI@2
    displayName: Build and Push Container Image
    env:
      ACR_NAME_PARAMETER: ${{ parameters.acrName }}
      ACR_SUBSCRIPTION_NAME_PARAMETER: ${{ parameters.acrSubscriptionName }}
      TAG_NAME_PARAMETER: ${{ parameters.tagName }}
    inputs:
      azureSubscription: $(serviceConnection)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -x
        if [[ -n  "${ACR_NAME_PARAMETER// /}" ]]; then
          ACR_NAME="${{ parameters.acrName }}"
        else
          ACR_NAME="$(acrName)"
        fi

        if [[ -n  "${ACR_SUBSCRIPTION_NAME_PARAMETER// /}" ]]; then
          SUBSCRIPTION_NAME="${{ parameters.acrSubscriptionName }}"
        else
          SUBSCRIPTION_NAME="$(subscriptionName)"
        fi

        if [[ -n  "${TAG_NAME_PARAMETER// /}" ]]; then
          TAG_NAME="${{ parameters.tagName }}"
        else
          TAG_NAME="$(Build.BuildNumber)"
        fi

        az acr login --name "${ACR_NAME}" --subscription "${SUBSCRIPTION_NAME}"
        docker build --platform=linux/amd64 --tag "${{ parameters.imageName }}:${TAG_NAME}" --file "${{ parameters.dockerFile }}" "${{ parameters.directory }}" --build-arg IMAGE_ACR="${ACR_NAME}.azurecr.io"
        docker tag "${{ parameters.imageName }}:${TAG_NAME}" "${ACR_NAME}.azurecr.io/ipaffs/${{ parameters.imageName }}:${TAG_NAME}"
        docker push "${ACR_NAME}.azurecr.io/ipaffs/${{ parameters.imageName }}:${TAG_NAME}"
