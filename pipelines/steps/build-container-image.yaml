parameters:
  - name: directory
    type: string
  - name: dockerFile
    type: string
  - name: imageName
    type: string

steps:
  - task: AzureCLI@2
    displayName: Build and Push Container Image
    variables:
      - group: "${{ parameters.environmentName }}"
      - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
          - group: HigherEnvs
      - ${{ else }}:
          - group: LowerEnvs
      - template: "/pipelines/vars/common.yaml"
      - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"
    inputs:
      azureSubscription: $(serviceConnection)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az acr login --name "$(acrName)" --subscription "$(subscriptionName)"
        docker build --platform=linux/amd64 --tag "${{ parameters.imageName }}:$(Build.BuildNumber)" --file "${{ parameters.dockerFile }}" "${{ parameters.directory }}"
        docker tag "${{ parameters.imageName }}:$(Build.BuildNumber)" "$(acrLoginServer)/ipaffs/${{ parameters.imageName }}:$(Build.BuildNumber)"
        docker push "$(acrLoginServer)/ipaffs/${{ parameters.imageName }}:$(Build.BuildNumber)"

