---
trigger: none
pr: none

pool:
  name: DEFRA-COMMON-ubuntu2204-SSV5

parameters:
  - name: environmentName
    displayName: Environment
    type: string
    default: DEV
    values:
      - DEV
      - TST
      - PRE
      - PRD

  - name: workers
    displayName: Workers
    default: 8
    values:
      - 4
      - 8
      - 12
      - 16

  - name: imageTag
    displayName: Image Tag
    default: latest

  - name: testSuite
    displayName: Test Suite
    type: string
    default: 'test'
    values:
      - test
      - test:a11y
      - test:cross-browser

variables:
  - group: Common
  - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
      - group: HigherEnvs
  - ${{ else }}:
      - group: LowerEnvs
  - group: "${{ parameters.environmentName }}"
  - template: "/pipelines/vars/common.yaml"
  - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"

resources:
  repositories:
    - repository: ipaffs-qa-automation
      type: github
      endpoint: DEFRA
      name: DEFRA/ipaffs-qa-automation
      ref: refs/heads/imta-21213 # Hardcoded against feature branch for now

steps:
  - checkout: self

  - checkout: ipaffs-qa-automation
    path: s/ipaffs-qa-automation

  - task: AzureCLI@2
    displayName: Update QA Automation environment file
    inputs:
      azureSubscription: $(serviceConnection)
      scriptType: bash
      scriptLocation: inlineScript
      workingDirectory: $(Pipeline.Workspace)/s/ipaffs-qa-automation
      inlineScript: |
        $(Pipeline.Workspace)/s/ipaffs-infra/scripts/pipeline/substitute-environment-variables.sh .env-kv $(keyVaultName) .env-substituted

  - task: AzureCLI@2
    displayName: Run Container
    env:
      CI: true
      WORKERS: ${{ parameters.workers }}
      IMAGE_TAG: ${{ parameters.imageTag }}
      PLAYWRIGHT_TAG: ${{ parameters.testSuite }}
    inputs:
      azureSubscription: $(serviceConnection)
      scriptType: bash
      scriptLocation: inlineScript
      workingDirectory: $(Pipeline.Workspace)/s/ipaffs-qa-automation
      inlineScript: |
        set -x
        az acr login --name "$(acrName)" --subscription "$(subscriptionName)"
        docker pull $(acrLoginServer)/ipaffs/qa-automation:${IMAGE_TAG}

        case "${PLAYWRIGHT_TAG}" in
          "test")
            docker run --init --env-file .env-substituted --env CI $(acrLoginServer)/ipaffs/qa-automation:${{ parameters.imageTag }} npm test -- --workers=${WORKERS}
            ;;
          "test:a11y")
            docker run --init --env-file .env-substituted --env CI $(acrLoginServer)/ipaffs/qa-automation:${{ parameters.imageTag }} npm test:a11y -- --workers=${WORKERS}
            ;;
          "test:cross-browser")
            docker run --init --env-file .env-substituted --env CI $(acrLoginServer)/ipaffs/qa-automation:${{ parameters.imageTag }} npm test:browserstack -- --workers=${WORKERS}
            ;;
          *)
            echo "Unknown test suite tag: ${PLAYWRIGHT_TAG}"
          ;;
        esac
