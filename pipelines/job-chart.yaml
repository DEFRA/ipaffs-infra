trigger:
  branches:
    include:
      - "*"
  paths:
    include:
      - helm-charts/ipaffs-common/**
      - helm-charts/job/**
      - pipelines/job-chart.yaml
      - scripts/pipeline/update-manifest-chart-version.sh

pr:
  branches:
    include:
      - main
  paths:
    include:
      - helm-charts/job/**
      - pipelines/job-chart.yaml
      - scripts/pipeline/update-manifest-chart-version.sh

pool:
  name: 'DEFRA-COMMON-ubuntu2204-SSV5'

resources:
  repositories:
    - repository: ipaffs-manifest
      type: github
      endpoint: DEFRA
      name: DEFRA/ipaffs-manifest
      ref: refs/heads/master

variables:
  - group: Common
  - group: LowerEnvs
  - group: "DEV"
  - template: "/pipelines/vars/common.yaml"
  - template: "/pipelines/vars/dev.yaml"
  - name: helmChartName
    value: job
  - name: helmChartPath
    value: helm-charts/job

parameters:
  - name: updateManifest
    type: boolean
    default: true

  - name: manifestBranch
    type: string
    default: auto

  - name: manifestTrunkBranch
    type: string
    default: master

stages:
  - stage: ExtractVersion
    displayName: Extract Chart Version
    jobs:
      - job: ExtractVersionFromChart
        displayName: Extract Chart Version
        steps:
          - task: Bash@3
            name: ComputeVersion
            displayName: Get current chart version
            inputs:
              targetType: inline
              workingDirectory: $(helmChartPath)
              script: |
                version="$(yq '.version' Chart.yaml)"
                echo "##vso[task.setvariable variable=helmChartVersion;isOutput=true]$version"

  - stage: Package_DEV
    displayName: Package Job Chart (DEV)
    dependsOn: ExtractVersion
    variables:
      - group: Common
      - group: "DEV"
      - template: "/pipelines/vars/common.yaml"
      - template: "/pipelines/vars/dev.yaml"
      - name: helmChartVersion
        value: $[ stageDependencies.ExtractVersion.ExtractVersionFromChart.outputs['ComputeVersion.helmChartVersion'] ]
      - name: gitUserName
        value: 'IPAFFS CI Bot'
      - name: gitUserEmail
        value: 'ipaffs-ci-bot@defra.gov.uk'
    jobs:
      - job: PackageFeatureBranch
        displayName: Package from feature branch (DEV)
        condition: and(not(failed()), not(canceled()), ne(variables['Build.SourceBranch'], 'refs/heads/main'))
        steps:
          - task: AzureCLI@2
            name: pushChartToRegistry
            displayName: Package and push chart to registry
            env:
              CHART_NAME: $(helmChartName)
              CHART_PATH: $(helmChartPath)
              CHART_VERSION: $(helmChartVersion)-build.$(Build.BuildNumber)
              REGISTRY_NAME: $(acrName)
              REGISTRY_HOST: $(acrLoginServer)
              REGISTRY_SUBSCRIPTION: $(subscriptionName)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/package-and-push-chart.sh

          - task: Bash@3
            name: SetFeatureChartVersion
            displayName: Record feature branch chart version
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                echo "##vso[task.setvariable variable=chartVersion;isOutput=true]$(helmChartVersion)-build.$(Build.BuildNumber)"

      - job: PackageMainBranch
        displayName: Bump chart version and package from main branch (DEV)
        condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        steps:
          - checkout: self
            persistCredentials: true
            clean: true

          - task: Bash@3
            name: bumpVersion
            displayName: Bump chart version
            env:
              CURRENT_VERSION: $(helmChartVersion)
            inputs:
              filePath: scripts/pipeline/bump-semver.sh

          - task: AzureCLI@2
            name: updateVersion
            displayName: Update chart version and push
            env:
              CHART_NAME: $(helmChartName)
              CHART_PATH: $(helmChartPath)
              CURRENT_VERSION: $(helmChartVersion)
              NEW_VERSION: $(bumpVersion.newVersion)
              GIT_USER: $(gitUserName)
              GIT_EMAIL: $(gitUserEmail)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/update-chart-version.sh

          - task: AzureCLI@2
            name: pushChartToRegistry
            displayName: Package and push chart to registry
            env:
              CHART_NAME: $(helmChartName)
              CHART_PATH: $(helmChartPath)
              CHART_VERSION: $(bumpVersion.newVersion)
              REGISTRY_NAME: $(acrName)
              REGISTRY_HOST: $(acrLoginServer)
              REGISTRY_SUBSCRIPTION: $(subscriptionName)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/package-and-push-chart.sh

          - task: Bash@3
            name: SetMainChartVersion
            displayName: Record main branch chart version
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                echo "##vso[task.setvariable variable=chartVersion;isOutput=true]$(bumpVersion.newVersion)"

  - ${{ if eq(parameters.updateManifest, true) }}:
    - stage: UpdateManifest
      displayName: Update ipaffs-manifest job chart version
      dependsOn: Package_DEV
      condition: and(
        not(failed()), not(canceled()),
        eq(dependencies.Package_DEV.result, 'Succeeded'),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/')
        )
      variables:
        - name: featureChartVersion
          value: $[ stageDependencies.Package_DEV.PackageFeatureBranch.outputs['SetFeatureChartVersion.chartVersion'] ]
        - name: mainChartVersion
          value: $[ stageDependencies.Package_DEV.PackageMainBranch.outputs['SetMainChartVersion.chartVersion'] ]
      jobs:
        - job: UpdateManifest
          displayName: Update job chart version in ipaffs-manifest
          steps:
            - checkout: self
              path: s/ipaffs-infra

            - checkout: ipaffs-manifest
              persistCredentials: true
              path: s/ipaffs-manifest

            - task: Bash@3
              displayName: Resolve and checkout manifest branch
              env:
                MANIFEST_BRANCH: "${{ parameters.manifestBranch }}"
                MANIFEST_TRUNK_BRANCH: "${{ parameters.manifestTrunkBranch }}"
                SOURCE_BRANCH: $(Build.SourceBranch)
              inputs:
                targetType: inline
                workingDirectory: $(Pipeline.Workspace)/s/ipaffs-manifest
                script: |
                  set -euo pipefail

                  source_branch="${SOURCE_BRANCH#refs/heads/}"
                  target_branch="${MANIFEST_BRANCH}"

                  if [[ "${target_branch}" == "auto" ]]; then
                    if [[ "${source_branch}" == "main" ]] || [[ "${source_branch}" == "master" ]]; then
                      target_branch="${MANIFEST_TRUNK_BRANCH}"
                    else
                      target_branch="${source_branch}"
                    fi
                  fi

                  if [[ -z "${target_branch}" ]]; then
                    echo "Target manifest branch cannot be empty" >&2
                    exit 1
                  fi

                  git fetch origin

                  if ! git ls-remote --exit-code --heads origin "${target_branch}" >/dev/null; then
                    if [[ "${target_branch}" == "${MANIFEST_TRUNK_BRANCH}" ]]; then
                      echo "Target manifest trunk branch '${target_branch}' does not exist" >&2
                      exit 1
                    fi

                    echo "Manifest branch '${target_branch}' does not exist. Skipping manifest update."
                    echo "##vso[task.setvariable variable=skipManifestUpdate]true"
                    exit 0
                  fi

                  git checkout -B "${target_branch}" "origin/${target_branch}"
                  echo "Using manifest branch: ${target_branch}"
                  echo "##vso[task.setvariable variable=targetManifestBranch]${target_branch}"
                  echo "##vso[task.setvariable variable=skipManifestUpdate]false"

            - task: Bash@3
              name: ResolveChartVersion
              displayName: Resolve chart version
              condition: and(not(failed()), not(canceled()), ne(variables['skipManifestUpdate'], 'true'))
              env:
                FEATURE_CHART_VERSION: "$(featureChartVersion)"
                MAIN_CHART_VERSION: "$(mainChartVersion)"
              inputs:
                targetType: inline
                script: |
                  set -euo pipefail

                  chart_version="${MAIN_CHART_VERSION:-}"
                  if [[ -z "${chart_version}" ]]; then
                    chart_version="${FEATURE_CHART_VERSION:-}"
                  fi

                  if [[ -z "${chart_version}" ]]; then
                    echo "Unable to resolve chart version for manifest update" >&2
                    exit 1
                  fi

                  echo "Using chart version: ${chart_version}"
                  echo "##vso[task.setvariable variable=chartVersion]${chart_version}"

            - task: Bash@3
              displayName: Update chart version in manifest helmfile
              condition: and(not(failed()), not(canceled()), ne(variables['skipManifestUpdate'], 'true'))
              env:
                CHART_NAME: $(helmChartName)
                CHART_VERSION: "$(chartVersion)"
                MANIFEST_ROOT: "$(Pipeline.Workspace)/s/ipaffs-manifest"
              inputs:
                targetType: filePath
                filePath: $(Pipeline.Workspace)/s/ipaffs-infra/scripts/pipeline/update-manifest-chart-version.sh
                workingDirectory: $(Pipeline.Workspace)/s/ipaffs-infra

            - task: Bash@3
              displayName: Commit and push manifest changes
              condition: and(not(failed()), not(canceled()), ne(variables['skipManifestUpdate'], 'true'))
              env:
                CHART_NAME: $(helmChartName)
                CHART_VERSION: "$(chartVersion)"
                MANIFEST_BRANCH: "$(targetManifestBranch)"
              inputs:
                targetType: inline
                workingDirectory: $(Pipeline.Workspace)/s/ipaffs-manifest
                script: |
                  set -euo pipefail

                  git config user.name "IPAFFS CI Bot"
                  git config user.email "ipaffs-ci-bot@defra.gov.uk"

                  git add helmfile.yaml.gotmpl

                  if git diff --cached --quiet; then
                    echo "No manifest helmfile changes for ${CHART_NAME}"
                    exit 0
                  fi

                  git commit -m "Update ${CHART_NAME} chart version to ${CHART_VERSION}"

                  if ! git ls-remote --exit-code --heads origin "${MANIFEST_BRANCH}" >/dev/null; then
                    echo "Manifest branch '${MANIFEST_BRANCH}' no longer exists. Skipping push."
                    exit 0
                  fi

                  git pull --rebase origin "${MANIFEST_BRANCH}"
                  git push origin "HEAD:${MANIFEST_BRANCH}"

