parameters:
  - name: environmentName
    type: string

  - name: serviceConnection
    type: string
    default: ""

  - name: migrationsClientId
    type: string
    default: ""

  - name: namespace
    type: string

  - name: serviceClientId
    type: string
    default: ""

  - name: servicePrincipalName
    type: string
    default: ""

  - name: serviceName
    type: string

  - name: serviceVersion
    type: string

  - name: repository
    type: string
    default: self

  - name: helmfileAction
    type: string
    default: apply

  - name: helmfileSelector
    type: string
    default: ""

  - name: acrNameOverride
    type: string
    default: ""

  - name: acrLoginServerOverride
    type: string
    default: ""

jobs:
  - job: DeployChart
    displayName: Deploy Helm Charts
    variables:
      - group: Common
      - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
        - group: HigherEnvs
      - ${{ else }}:
        - group: LowerEnvs
      - group: "${{ parameters.environmentName }}"
      - template: "/pipelines/vars/common.yaml"
      - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"

    steps:
      - checkout: ${{ parameters.repository }}
        workspaceRepo: true

      - task: AzureCLI@2
        name: AuthenticateAzure
        displayName: Authenticate with Azure
        env:
          ${{ if ne(parameters.acrNameOverride, '') }}:
            ACR_NAME: ${{ parameters.acrNameOverride }}
          ${{ else }}:
            ACR_NAME: $(acrName)
        inputs:
          azureSubscription: ${{ coalesce(parameters.serviceConnection, variables.serviceConnection) }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -x
            az aks install-cli --client-version v1.36.1 --kubelogin-version v0.2.18
            az aks get-credentials -n "$(kubernetesCluster)" -g "$(resourceGroupName)" --subscription "$(subscriptionName)"
            kubelogin convert-kubeconfig -l azurecli
            az acr login --name "${ACR_NAME}" --subscription "$(subscriptionName)"

      - task: AzureCLI@2
        name: DeployHelmCharts
        displayName: Deploy Helm Charts
        env:
          ENVIRONMENT: ${{ lower(parameters.environmentName) }}
          AZURE_LOCATION: $(location)
          ${{ if ne(parameters.acrLoginServerOverride, '') }}:
            AZURE_CONTAINER_REGISTRY_HOST: ${{ parameters.acrLoginServerOverride }}
          ${{ else }}:
            AZURE_CONTAINER_REGISTRY_HOST: $(acrLoginServer)
          APPLICATIONINSIGHTS_CONNECTION_STRING: $(insightsConnectionString)
          APPLICATIONINSIGHTS_INSTRUMENTATION_STRING: $(insightsInstrumentationKey)
          AZURE_TENANT_ID: $(tenantId)
          AZURE_MANAGED_IDENTITY_CLIENT_ID: ${{ parameters.serviceClientId }}
          AZURE_MANAGED_IDENTITY_PRINCIPAL_NAME: ${{ parameters.servicePrincipalName }}
          AZURE_MANAGED_IDENTITY_MIGRATIONS_CLIENT_ID: ${{ parameters.migrationsClientId }}
          AZURE_MANAGED_IDENTITY_EXTERNAL_SECRETS_CLIENT_ID: $(externalSecretsClientId)
          AZURE_SQL_SERVER_NAME: $(sqlServerName)
          AZURE_SEARCH_SUBSCRIPTION_ID: $(searchServiceSubscriptionId)
          AZURE_SEARCH_RESOURCE_GROUP_NAME: $(searchServiceResourceGroupName)
          AZURE_SEARCH_SERVICE_NAME: $(searchServiceName)
          AZURE_STORAGE_ACCOUNT_NAME: $(storageAccountName)
          AZURE_SEARCH_MANAGED_IDENTITY_PRINCIPAL_NAME: $(searchServiceManagedIdentityPrincipalName)
          CONTAINER_IMAGE: "ipaffs/${{ parameters.serviceName }}:${{ parameters.serviceVersion }}"
          MIGRATIONS_IMAGE: "ipaffs/${{ parameters.serviceName }}-configuration:${{ parameters.serviceVersion }}"
          NAMESPACE: ${{ parameters.namespace }}
          HELMFILE_SELECTOR: "${{ parameters.helmfileSelector }}"
          SOURCE_REF: $(Build.SourceBranch)
        inputs:
          azureSubscription: ${{ coalesce(parameters.serviceConnection, variables.serviceConnection) }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            manifest_tag=""
            if [[ "${SOURCE_REF}" == refs/tags/* ]]; then
              manifest_tag="${SOURCE_REF#refs/tags/}"
            fi
            export MANIFEST_TAG="${manifest_tag}"

            printenv

            curl -L https://github.com/helmfile/helmfile/releases/download/v1.1.9/helmfile_1.1.9_linux_amd64.tar.gz | tar -xz
            chmod +x ./helmfile
            ./helmfile init --force

            selector_args=()
            if [[ -n "${HELMFILE_SELECTOR}" ]]; then
              selector_args=(--selector "${HELMFILE_SELECTOR}")
            fi

            ./helmfile ${{ parameters.helmfileAction }} --debug "${selector_args[@]}"

