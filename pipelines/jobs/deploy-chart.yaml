parameters:
  - name: environmentName
    type: string

  - name: migrationsClientId
    type: string

  - name: namespace
    type: string

  - name: serviceClientId
    type: string

  - name: servicePrincipalName
    type: string

  - name: serviceName
    type: string

  - name: serviceVersion
    type: string

  - name: repository
    type: string
    default: self

  - name: helmfileAction
    type: string
    default: apply

jobs:
  - job: DeployChart
    displayName: Deploy Helm Charts
    variables:
      - group: "${{ parameters.environmentName }}"
      - template: "/pipelines/vars/common.yaml"
      - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"

    steps:
      - checkout: ${{ parameters.repository }}
        workspaceRepo: true

      - task: AzureCLI@2
        name: AuthenticateAzure
        displayName: Authenticate with Azure
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -x
            az aks install-cli
            az aks get-credentials -n "$(kubernetesCluster)" -g "$(resourceGroupName)" --subscription "$(subscriptionName)"
            az acr login --name "$(acrName)"

      - task: AzureCLI@2
        name: DeployHelmCharts
        displayName: Deploy Helm Charts
        env:
          ENVIRONMENT: ${{ lower(parameters.environmentName) }}
          AZURE_LOCATION: $(location)
          AZURE_CONTAINER_REGISTRY_HOST: $(acrLoginServer)
          AZURE_TENANT_ID: $(tenantId)
          AZURE_MANAGED_IDENTITY_CLIENT_ID: ${{ parameters.serviceClientId }}
          AZURE_MANAGED_IDENTITY_PRINCIPAL_NAME: ${{ parameters.servicePrincipalName }}
          AZURE_MANAGED_IDENTITY_MIGRATIONS_CLIENT_ID: ${{ parameters.migrationsClientId }}
          AZURE_MANAGED_IDENTITY_EXTERNAL_SECRETS_CLIENT_ID: $(externalSecretsClientId)
          AZURE_SQL_SERVER_NAME: $(sqlServerName)
          AZURE_SEARCH_SUBSCRIPTION_ID: $(searchServiceSubscriptionId)
          AZURE_SEARCH_RESOURCE_GROUP_NAME: $(searchServiceResourceGroupName)
          AZURE_SEARCH_SERVICE_NAME: $(searchServiceName)
          AZURE_STORAGE_ACCOUNT_NAME: $(storageAccountName)
          AZURE_SEARCH_MANAGED_IDENTITY_PRINCIPAL_NAME: $(searchServiceManagedIdentityPrincipalName)
          CONTAINER_IMAGE: "ipaffs/${{ parameters.serviceName }}:${{ parameters.serviceVersion }}"
          MIGRATIONS_IMAGE: "ipaffs/${{ parameters.serviceName }}-configuration:${{ parameters.serviceVersion }}"
          NAMESPACE: ${{ parameters.namespace }}
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            printenv && \
            curl -L https://github.com/helmfile/helmfile/releases/download/v1.1.9/helmfile_1.1.9_linux_amd64.tar.gz | tar -xz && \
            chmod +x ./helmfile && \
            ./helmfile init --force && \
            ./helmfile ${{ parameters.helmfileAction }} --debug

