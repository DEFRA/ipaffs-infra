parameters:
  - name: serviceName
    type: string
  - name: dockerFile
    type: string
    default: Dockerfile

jobs:
  - job: Package
    displayName: Package
    variables:
      - group: Common
      - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
          - group: HigherEnvs
      - ${{ else }}:
          - group: LowerEnvs
      - group: "${{ parameters.environmentName }}"
      - template: "/pipelines/vars/common.yaml"
      - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"

    steps:
      - task: DownloadPipelineArtifact@2
        displayName: 'Download service artifacts'
        inputs:
          artifact: 'service'
          path: './service'

      - template: /pipelines/steps/build-container-image.yaml@ipaffs-infra
        parameters:
          dockerFile: ${{ parameters.dockerFile }}
          directory: ./service
          imageName: ${{ parameters.serviceName }}
