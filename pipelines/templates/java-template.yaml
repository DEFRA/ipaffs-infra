---
parameters:
  - name: environmentName
    displayName: Environment
    type: string
    default: DEV

  - name: serviceName
    type: string

  - name: dockerFile
    type: string
    default: Dockerfile

  - name: migrations
    type: boolean
    default: false

  - name: mvnGoals
    type: string
    default: verify jacoco:report package

  - name: helmfileAction
    type: string
    default: apply

  - name: updateManifest
    type: boolean
    default: true

  - name: manifestBranch
    type: string
    default: auto

  - name: manifestTrunkBranch
    type: string
    default: master

stages:
  - stage: BuildService
    displayName: Build Service
    jobs:
      - template: /pipelines/jobs/build-java-project.yaml@ipaffs-infra
        parameters:
          mvnGoals:  "${{ parameters.mvnGoals }}"

  - stage: PackageService
    displayName: Package Service Image
    dependsOn: BuildService
    jobs:
      - template: /pipelines/jobs/package-java-project.yaml@ipaffs-infra
        parameters:
          migrations: ${{ parameters.migrations }}
          serviceName:  "${{ parameters.serviceName }}"
          dockerFile: "${{ parameters.dockerFile }}"

  - ${{ if eq(parameters.updateManifest, true) }}:
    - stage: UpdateManifest
      displayName: Update ipaffs-manifest
      dependsOn: PackageService
      condition: and(
        eq(dependencies.PackageService.result, 'Succeeded'),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/')
        )
      jobs:
        - job: UpdateManifest
          displayName: Update service values in ipaffs-manifest
          steps:
            - checkout: self
              path: s/self

            - checkout: ipaffs-manifest
              persistCredentials: true
              path: s/ipaffs-manifest

            - checkout: ipaffs-infra
              path: s/ipaffs-infra

            - task: Bash@3
              displayName: Resolve and checkout manifest branch
              env:
                MANIFEST_BRANCH: "${{ parameters.manifestBranch }}"
                MANIFEST_TRUNK_BRANCH: "${{ parameters.manifestTrunkBranch }}"
                SOURCE_BRANCH: $(Build.SourceBranch)
              inputs:
                targetType: inline
                workingDirectory: $(Pipeline.Workspace)/s/ipaffs-manifest
                script: |
                  set -euo pipefail

                  source_branch="${SOURCE_BRANCH#refs/heads/}"
                  target_branch="${MANIFEST_BRANCH}"

                  if [[ "${target_branch}" == "auto" ]]; then
                    if [[ "${source_branch}" == "main" ]] || [[ "${source_branch}" == "master" ]]; then
                      target_branch="${MANIFEST_TRUNK_BRANCH}"
                    else
                      target_branch="${source_branch}"
                    fi
                  fi

                  if [[ -z "${target_branch}" ]]; then
                    echo "Target manifest branch cannot be empty" >&2
                    exit 1
                  fi

                  git fetch origin

                  if ! git ls-remote --exit-code --heads origin "${target_branch}" >/dev/null; then
                    if [[ "${target_branch}" == "${MANIFEST_TRUNK_BRANCH}" ]]; then
                      echo "Target manifest trunk branch '${target_branch}' does not exist" >&2
                      exit 1
                    fi

                    echo "Manifest branch '${target_branch}' does not exist. Skipping manifest update."
                    echo "##vso[task.setvariable variable=skipManifestUpdate]true"
                    exit 0
                  fi

                  git checkout -B "${target_branch}" "origin/${target_branch}"
                  echo "Using manifest branch: ${target_branch}"
                  echo "##vso[task.setvariable variable=targetManifestBranch]${target_branch}"
                  echo "##vso[task.setvariable variable=skipManifestUpdate]false"

            - task: Bash@3
              displayName: Update service values files
              condition: ne(variables['skipManifestUpdate'], 'true')
              env:
                SERVICE_NAME: "${{ parameters.serviceName }}"
                BUILD_NUMBER: $(Build.BuildNumber)
                ACR_LOGIN_SERVER: $(acrLoginServer)
                MANIFEST_ROOT: "$(Pipeline.Workspace)/s/ipaffs-manifest"
                SERVICE_ROOT: "$(Pipeline.Workspace)/s/self"
              inputs:
                targetType: filePath
                filePath: $(Pipeline.Workspace)/s/ipaffs-infra/scripts/pipeline/update-manifest-service-values.sh
                workingDirectory: $(Pipeline.Workspace)/s/ipaffs-infra

            - task: Bash@3
              displayName: Commit and push manifest changes
              condition: ne(variables['skipManifestUpdate'], 'true')
              env:
                SERVICE_NAME: "${{ parameters.serviceName }}"
                BUILD_NUMBER: $(Build.BuildNumber)
                MANIFEST_BRANCH: "$(targetManifestBranch)"
              inputs:
                targetType: inline
                workingDirectory: $(Pipeline.Workspace)/s/ipaffs-manifest
                script: |
                  set -euo pipefail

                  git config user.name "IPAFFS CI Bot"
                  git config user.email "ipaffs-ci-bot@defra.gov.uk"

                  git add \
                    "services/${SERVICE_NAME}/base.yaml" \
                    "environments/dev/${SERVICE_NAME}.yaml" \
                    "environments/tst/${SERVICE_NAME}.yaml" \
                    "environments/pre/${SERVICE_NAME}.yaml" \
                    "environments/prd/${SERVICE_NAME}.yaml"

                  if git diff --cached --quiet; then
                    echo "No manifest changes for ${SERVICE_NAME}"
                    exit 0
                  fi

                  git commit -m "Update ${SERVICE_NAME} values for build ${BUILD_NUMBER}"

                  if ! git ls-remote --exit-code --heads origin "${MANIFEST_BRANCH}" >/dev/null; then
                    echo "Manifest branch '${MANIFEST_BRANCH}' no longer exists. Skipping push."
                    exit 0
                  fi

                  git pull --rebase origin "${MANIFEST_BRANCH}"
                  git push origin "HEAD:${MANIFEST_BRANCH}"

  - stage: ConfigureDeployment
    displayName: Configure Deployment
    dependsOn:
      - PackageService
    variables:
      - name: branch
        value: $[replace(variables['Build.SourceBranch'], 'refs/heads/', '')]
      - name: trunkBranch
        value: master
    jobs:
      - job: SetNamespace
        displayName: Set Namespace
        continueOnError: true
        steps:
          - template: /pipelines/steps/determine-namespace.yaml@ipaffs-infra
            parameters:
              branch: $(branch)
              environmentName: ${{ parameters.environmentName }}
              trunkBranch: $(trunkBranch)

  - stage: DeployIdentities
    displayName: Deploy and configure identity infrastructure
    dependsOn: ConfigureDeployment
    condition: eq(dependencies.ConfigureDeployment.result, 'Succeeded')
    variables:
      - name: namespace
        value: $[stageDependencies.ConfigureDeployment.SetNamespace.outputs['Namespace.namespace']]
    jobs:
      - template: /pipelines/jobs/deploy-identities.yaml@ipaffs-infra
        parameters:
          environmentName: ${{ parameters.environmentName }}
          migrations: ${{ parameters.migrations }}
          namespace: $(namespace)
          serviceName: $(serviceName)

  - stage: DeployChart
    displayName: Deploy Helm Charts
    dependsOn:
      - ConfigureDeployment
      - DeployIdentities
    condition: eq(dependencies.ConfigureDeployment.result, 'Succeeded')
    variables:
      - name: namespace
        value: $[stageDependencies.ConfigureDeployment.SetNamespace.outputs['Namespace.namespace']]
      - name: migrationsClientId
        value: $[stageDependencies.DeployIdentities.MigrationsIdentity.outputs['CreateIdentity.clientId']]
      - name: serviceClientId
        value: $[stageDependencies.DeployIdentities.ServiceIdentity.outputs['CreateIdentity.clientId']]
      - name: servicePrincipalName
        value: $[stageDependencies.DeployIdentities.ServiceIdentity.outputs['CreateIdentity.principalName']]
    jobs:
      - template: /pipelines/jobs/deploy-chart.yaml@ipaffs-infra
        parameters:
          environmentName: ${{ parameters.environmentName }}
          namespace: $(namespace)
          serviceName: $(serviceName)
          serviceVersion: $(Build.BuildNumber)
          migrationsClientId: $(migrationsClientId)
          serviceClientId: $(serviceClientId)
          servicePrincipalName: $(servicePrincipalName)
          helmfileAction: "${{ parameters.helmfileAction }}"

