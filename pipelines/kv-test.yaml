---
trigger:
  branches:
    include:
      - imta-21564-drift

pool:
  name: DEFRA-COMMON-ubuntu2204-SSV5

variables:
  - group: "${{ parameters.environmentName }}"

parameters:
  - name: environmentName
    type: string
    default: PRE
    values:
      - PRE

stages:
  - stage: Deploy
    jobs:
      - deployment: Deploy
        environment:
          name: "${{ parameters.environmentName }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Deploy
                  env:
                    AZURE_CONFIG_DIR: $(Pipeline.Workspace)/.azure
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az account show

                - task: AzureCLI@2
                  displayName: Deploy
                  env:
                    AZURE_CONFIG_DIR: $(Pipeline.Workspace)/.azure2
                  inputs:
                    azureSubscription: $(classicServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az account show

                - task: AzureCLI@2
                  displayName: Deploy
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      AZURE_CONFIG_DIR=$(Pipeline.Workspace)/.azure2 az keyvault secret list --vault-name SECIMPPREKVT001
                      AZURE_CONFIG_DIR=$(Pipeline.Workspace)/.azure az keyvault secret list --vault-name PREIMPINFKV1401

