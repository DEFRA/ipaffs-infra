---
trigger:
  branches:
    include:
      - imta-21564-drift

pool:
  name: DEFRA-COMMON-ubuntu2204-SSV5

variables:
  - group: "${{ parameters.environmentName }}"

parameters:
  - name: environmentName
    type: string
    default: TST
    values:
      - TST

stages:
  - stage: Deploy
    jobs:
      - deployment: Deploy
        environment:
          name: "${{ parameters.environmentName }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Deploy
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az keyvault secret list --vault-name SECIMPTSTKVT001

                - task: AzureCLI@2
                  displayName: Deploy
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az keyvault secret list --vault-name TSTIMPINFKV1401

