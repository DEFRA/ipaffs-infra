---
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - helm-charts/*-values.yaml
      - helm-charts/app-routing-controller/**
      - helm-charts/azure-service-operator-config/**
      - helm-charts/external-secrets-azure/**
      - helm-charts/ms-identity-redirect-handler/**
      - pipelines/install-helm-charts.yaml
      - pipelines/stages/install-helm-charts.yaml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - helm-charts/*-values.yaml
      - helm-charts/app-routing-controller/**
      - helm-charts/azure-service-operator-config/**
      - helm-charts/external-secrets-azure/**
      - helm-charts/ms-identity-redirect-handler/**
      - pipelines/install-helm-charts.yaml
      - pipelines/stages/install-helm-charts.yaml

pool:
  name: DEFRA-COMMON-ubuntu2204-SSV5

parameters:
  - name: environmentName
    displayName: Environment
    type: string
    default: DEV
    values:
      - DEV
      - TST
      - PRE
      - PRD

variables:
  - group: Common
  - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
    - group: HigherEnvs
  - ${{ else }}:
    - group: LowerEnvs
  - group: "${{ parameters.environmentName }}"
  - template: "/pipelines/vars/common.yaml"
  - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"
  - name: helmDryRun
    ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
      value: ''
    ${{ else }}:
      value: '--dry-run'

stages:
  - template: stages/tag-build.yaml
    parameters:
      tags:
        - Environment-${{ parameters.environmentName }}

  - template: stages/install-helm-charts.yaml
    parameters:
      environmentName: ${{ parameters.environmentName }}

