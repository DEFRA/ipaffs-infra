---
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - bicep/envs/*/30-classic.bicepparam
      - bicep/30-classic.bicep
      - pipelines/classic.yaml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - bicep/envs/*/30-classic.bicepparam
      - bicep/30-classic.bicep
      - pipelines/classic.yaml

pool:
  name: DEFRA-COMMON-ubuntu2204-SSV5

parameters:
  - name: environmentName
    displayName: Environment
    type: string
    default: SND
    values:
      - SND
      - TST
      - PRE
      - PRD

variables:
  - group: Common
  - group: "${{ parameters.environmentName }}"
  - template: "vars/common.yaml"
  - template: "vars/${{ lower(parameters.environmentName) }}.yaml"

stages:
  - stage: DeployInfrastructure
    displayName: Deploy Infrastructure
    jobs:
      - deployment: DeployBicep
        displayName: Deploy Bicep Templates
        environment:
          name: "${{ parameters.environmentName }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: WhatIf - Classic
                  inputs:
                    azureSubscription: $(classicServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment group what-if \
                        --name "Classic-$(Build.BuildId)" \
                        --subscription $(classicSubscriptionId) \
                        --resource-group $(classicResourceGroupName) \
                        --template-file bicep/30-classic.bicep \
                        --parameters bicep/envs/${{ lower(parameters.environmentName) }}/30-classic.bicepparam

                - task: AzureCLI@2
                  displayName: Deploy - Classic
                  condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
                  inputs:
                    azureSubscription: $(classicServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment group create \
                        --name "Classic-$(Build.BuildId)" \
                        --subscription $(classicSubscriptionId) \
                        --resource-group $(classicResourceGroupName) \
                        --template-file bicep/30-classic.bicep \
                        --parameters bicep/envs/${{ lower(parameters.environmentName) }}/30-classic.bicepparam

# vim: set ts=2 sts=2 sw=2 et:
