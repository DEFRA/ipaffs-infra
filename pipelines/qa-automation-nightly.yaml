---
schedules:
  - cron: "0 0 * * *"
    displayName: "Run QA automation tests nightly"
    branches:
      include: [ main, imta-21344 ]
    always: true

trigger: none
pr: none

pool:
  name: DEFRA-COMMON-ubuntu2204-SSV5

variables:
  - template: "/pipelines/vars/dev.yaml"

jobs:
  - job: TriggerCorePipeline
    steps:
      - task: AzureCLI@2
        name: TriggerQAPipeline
        displayName: Trigger QA Pipeline
        env:
          PIPELINE_ID: 11345
          ADO_ORG_URL: $(System.CollectionUri)
          ADO_PROJECT: $(System.TeamProject)
          AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
          IPAFFS_ENGINEERING_WEBHOOK_URL: $(ipaffsEngineeringChannelHook)
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
#            az pipelines run \
#              --id ${PIPELINE_ID} \
#              --org "${ADO_ORG_URL}" \
#              --project "${ADO_PROJECT}" \
#              --parameters environmentName="NEW-TST" \
#              --branch "imta-21344"

            MESSAGE="🔔 QA Automation Update
            • *Status:* Completed Run
            • *Pipeline:* $(Build.DefinitionName)
            • *Triggered By:* $(Build.RequestedFor)"
            JSON_PAYLOAD="{\"text\":\"Hello world\"}"
            curl -X POST -H 'Content-type: application/json' --data "${JSON_PAYLOAD}" "${IPAFFS_ENGINEERING_WEBHOOK_URL}"
