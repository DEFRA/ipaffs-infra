trigger:
  branches:
    include:
      - main

pool:
  name: DEFRA-COMMON-ubuntu2204-SSV5

variables:
  azureSubscription: 'ADO-DefraGovUK-AZR-POC_IMP' # Name of service connection
  objectId: '7ad856a1-208f-4932-9d37-93c1cabd761c'
  tenantId: '770a2450-0227-4c62-90c7-4e38537f1102'
  resourceGroupName: 'POCIMPINFRG1401'
  location: 'uksouth'

stages:
  - stage: DeployInfra
    jobs:
      - job: Deploy
        steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment group create \
                  --resource-group $(resourceGroupName) \
                  --template-file bicep/main.bicep \
                  --parameters location=$(location) tenantId=$(tenantId) objectId=$(objectId)
