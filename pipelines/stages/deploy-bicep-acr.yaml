parameters:
  - name: environmentName
    type: string

stages:
  - stage: ConfigureACRDeployment
    displayName: Configure deployment
    variables:
      - group: Common
      - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
        - group: HigherEnvs
      - ${{ else }}:
        - group: LowerEnvs
      - group: "${{ parameters.environmentName }}"
      - template: "vars/common.yaml"
      - template: "vars/${{ lower(parameters.environmentName) }}.yaml"
    jobs:
      - job: ConfigureBicep
        displayName: Configure Bicep
        steps:
          - checkout: self

          - task: Bash@3
            name: GenerateBicepParams
            displayName: Generate Bicep Params
            inputs:
              targetType: inline
              script: |
                set -ex
                cat <<- 'EOF' >'$(Build.SourcesDirectory)/25-acr-runtime.bicepparam'
                using '25-acr.bicep'
                extends 'envs/${{ lower(parameters.environmentName) }}/25-acr.bicepparam'
                param entraGroups = {
                  acrPull: {
                    id: '$(acrPullGroupId)'
                    name: '$(acrPullGroupName)'
                  }
                }
                param subnets = {
                  privateEndpoints: {
                    id: '$(privateEndpointsSubnetId)'
                    name: '$(privateEndpointsSubnetName)'
                  }
                }
                EOF
                cat '$(Build.SourcesDirectory)/25-acr-runtime.bicepparam'

          - task: PublishPipelineArtifact@1
            displayName: Publish artifact
            inputs:
              artifactName: bicepparam-acr
              targetPath: $(Build.SourcesDirectory)/25-acr-runtime.bicepparam


  - stage: DeployACR
    displayName: Deploy ACR
    variables:
      - group: Common
      - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
        - group: HigherEnvs
      - ${{ else }}:
        - group: LowerEnvs
      - group: "${{ parameters.environmentName }}"
      - template: "vars/common.yaml"
      - template: "vars/${{ lower(parameters.environmentName) }}.yaml"
    jobs:
      - deployment: RunBicep
        displayName: Run Bicep
        environment:
          name: "${{ parameters.environmentName }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: DownloadPipelineArtifact@2
                  displayName: Download artifact
                  inputs:
                    artifactName: bicepparam-acr
                    targetPath: $(Build.SourcesDirectory)/bicep

                - task: AzureCLI@2
                  displayName: WhatIf - ACR
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -x
                      az deployment group what-if \
                        --name "ACR-$(Build.BuildId)" \
                        --subscription $(subscriptionId) \
                        --resource-group $(resourceGroupName) \
                        --template-file bicep/25-acr.bicep \
                        --parameters bicep/25-acr-runtime.bicepparam

                - task: AzureCLI@2
                  displayName: Deploy - ACR
                  condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -x
                      az deployment group create \
                        --name "ACR-$(Build.BuildId)" \
                        --subscription $(subscriptionId) \
                        --resource-group $(resourceGroupName) \
                        --template-file bicep/25-acr.bicep \
                        --parameters bicep/25-acr-runtime.bicepparam

                - task: AzureCLI@2
                  displayName: Wait for Deployment - ACR
                  condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -x
                      az deployment group wait \
                        --name "ACR-$(Build.BuildId)" \
                        --subscription $(subscriptionId) \
                        --resource-group $(resourceGroupName) \
                        --created


  - stage: SaveACRDeploymentDetails
    displayName: Save ACR deployment details
    dependsOn: DeployACR
    variables:
      - group: Common
      - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
        - group: HigherEnvs
      - ${{ else }}:
        - group: LowerEnvs
      - group: "${{ parameters.environmentName }}"
      - template: "vars/common.yaml"
      - template: "vars/${{ lower(parameters.environmentName) }}.yaml"
    jobs:
      - job: StoreLibraryVariables
        displayName: Store library variables
        steps:
          - checkout: self

          - task: AzureCLI@2
            name: ACROutputs
            displayName: ACR outputs
            condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
            env:
              ADO_ORG_URL: $(System.CollectionUri)
              ADO_PROJECT: $(System.TeamProject)
              ADO_GROUP_NAME: LowerEnvs
              AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
              DEPLOYMENT_NAME: ACR-$(Build.BuildId)
              RESOURCE_GROUP: $(resourceGroupName)
              SUBSCRIPTION_ID: $(subscriptionId)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -x
                scripts/pipeline/update-group-variable-from-deployment.sh acrLoginServer acrLoginServer
                scripts/pipeline/update-group-variable-from-deployment.sh acrName acrName
                scripts/pipeline/update-group-variable-from-deployment.sh acrResourceId acrResourceId

