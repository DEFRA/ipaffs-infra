parameters:
  - name: environmentName
    type: string

stages:
  - stage: ImportAcrArtifacts
    displayName: Import ACR Artifacts
    jobs:
      - deployment: ImportContainerImages
        displayName: Import Container Images
        environment:
          name: "${{ parameters.environmentName }}"
        condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Import jetstack/cert-manager-controller
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az acr import \
                        --name $(acrName) \
                        --subscription $(subscriptionName) \
                        --source quay.io/jetstack/cert-manager-controller:v1.19.1 \
                        --image jetstack/cert-manager-controller:v1.19.1 \
                        --force \
                        --verbose

                - task: AzureCLI@2
                  displayName: Import jetstack/cert-manager-cainjector
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az acr import \
                        --name $(acrName) \
                        --subscription $(subscriptionName) \
                        --source quay.io/jetstack/cert-manager-cainjector:v1.19.1 \
                        --image jetstack/cert-manager-cainjector:v1.19.1 \
                        --force \
                        --verbose

                - task: AzureCLI@2
                  displayName: Import jetstack/cert-manager-startupapicheck
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az acr import \
                        --name $(acrName) \
                        --subscription $(subscriptionName) \
                        --source quay.io/jetstack/cert-manager-startupapicheck:v1.19.1 \
                        --image jetstack/cert-manager-startupapicheck:v1.19.1 \
                        --force \
                        --verbose

                - task: AzureCLI@2
                  displayName: Import jetstack/cert-manager-webhook
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az acr import \
                        --name $(acrName) \
                        --subscription $(subscriptionName) \
                        --source quay.io/jetstack/cert-manager-webhook:v1.19.1 \
                        --image jetstack/cert-manager-webhook:v1.19.1 \
                        --force \
                        --verbose

                - task: AzureCLI@2
                  displayName: Import k8s/azureserviceoperator
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az acr import \
                        --name $(acrName) \
                        --subscription $(subscriptionName) \
                        --source mcr.microsoft.com/k8s/azureserviceoperator:v2.16.0 \
                        --image k8s/azureserviceoperator:v2.16.0 \
                        --force \
                        --verbose

                - task: AzureCLI@2
                  displayName: Import external-secrets/external-secrets
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az acr import \
                        --name $(acrName) \
                        --subscription $(subscriptionName) \
                        --source ghcr.io/external-secrets/external-secrets:v1.1.1 \
                        --image external-secrets/external-secrets:v1.1.1 \
                        --force \
                        --verbose

                - task: AzureCLI@2
                  displayName: Import manicminer/ms-identity-redirect-handler
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az acr import \
                        --name $(acrName) \
                        --subscription $(subscriptionName) \
                        --source docker.io/manicminer/ms-identity-redirect-handler:v0.1.1 \
                        --image manicminer/ms-identity-redirect-handler:v0.1.1 \
                        --username $(dockerHubUser) \
                        --password $(dockerHubToken) \
                        --force \
                        --verbose

                - task: AzureCLI@2
                  displayName: Import manicminer/workload-identity-adal-bridge
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az acr import \
                        --name $(acrName) \
                        --subscription $(subscriptionName) \
                        --source docker.io/manicminer/workload-identity-adal-bridge:v0.4.2 \
                        --image manicminer/workload-identity-adal-bridge:v0.4.2 \
                        --username $(dockerHubUser) \
                        --password $(dockerHubToken) \
                        --force \
                        --verbose

