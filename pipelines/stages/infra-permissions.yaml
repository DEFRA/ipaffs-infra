parameters:
  - name: environmentName
    type: string

stages:
  - stage: InfraPermissions
    displayName: Infrastructure Permissions
    variables:
      - group: "${{ parameters.environmentName }}"
      - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
        - group: HigherEnvs
      - ${{ else }}:
        - group: LowerEnvs
      - template: "/pipelines/vars/common.yaml"
      - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"
    jobs:
      - deployment: GroupMemberships
        displayName: Group Memberships
        environment:
          name: "${{ parameters.environmentName }}"
        condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  name: SQLServerDirectoryReaders
                  displayName: Add SQL Server Managed Identity to Directory Readers Group
                  env:
                    GROUP_ID: $(directoryReadersGroupObjectId)
                    PRINCIPAL_ID: $(sqlServerManagedIdentityObjectId)
                  inputs:
                    # TODO: Get other service connection SPs added as group owners
                    azureSubscription: ADO-DefraGovUK-AZR-POC_IMP
                    scriptType: bash
                    scriptPath: scripts/pipeline/add-principal-to-group.sh

                - task: AzureCLI@2
                  name: SearchServiceSQLAdmins
                  env:
                    GROUP_ID: $(sqlAdminGroupId)
                    PRINCIPAL_ID: $(searchServiceManagedIdentityPrincipalId)
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptPath: scripts/pipeline/add-principal-to-group.sh

                - task: AzureCLI@2
                  name: AksKubeletAcrPull
                  env:
                    GROUP_ID: $(acrPullGroupId)
                    PRINCIPAL_ID: $(aksKubeletPrincipalId)
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptPath: scripts/pipeline/add-principal-to-group.sh

                - task: AzureCLI@2
                  name: ExternalSecretsDefraCertificateReaders
                  env:
                    GROUP_ID: $(defraCertificateReadersGroupId)
                    PRINCIPAL_ID: $(externalSecretsPrincipalObjectId)
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptPath: scripts/pipeline/add-principal-to-group.sh

