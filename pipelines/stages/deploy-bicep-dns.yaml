parameters:
  - name: environmentName
    type: string

stages:
  - stage: DeployDNS
    displayName: Deploy DNS
    variables:
      - group: Common
      - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
        - group: HigherEnvs
      - ${{ else }}:
        - group: LowerEnvs
      - group: "${{ parameters.environmentName }}"
      - template: "/pipelines/vars/common.yaml"
      - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"
    jobs:
      - deployment: RunBicep
        displayName: Run Bicep
        environment:
          name: "${{ parameters.environmentName }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: WhatIf - DNS
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -x
                      az deployment group what-if \
                        --name "DNS-$(Build.BuildId)" \
                        --subscription $(dnsSubscriptionId) \
                        --resource-group $(dnsResourceGroupName) \
                        --template-file bicep/60-dns.bicep \
                        --parameters bicep/envs/${{ lower(parameters.environmentName) }}/60-dns.bicepparam

                - task: AzureCLI@2
                  displayName: Deploy - DNS
                  condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -x
                      az deployment group create \
                        --name "DNS-$(Build.BuildId)" \
                        --subscription $(dnsSubscriptionId) \
                        --resource-group $(dnsResourceGroupName) \
                        --template-file bicep/60-dns.bicep \
                        --parameters bicep/envs/${{ lower(parameters.environmentName) }}/60-dns.bicepparam

                - task: AzureCLI@2
                  displayName: Wait for Deployment - DNS
                  condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -x
                      az deployment group wait \
                        --name "DNS-$(Build.BuildId)" \
                        --subscription $(dnsSubscriptionId) \
                        --resource-group $(dnsResourceGroupName) \
                        --created

