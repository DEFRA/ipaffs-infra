parameters:
  - name: environmentName
    type: string

stages:
  - ${{ if eq(parameters.environmentName, 'DEV') }}:
    - stage: CreateUserGroups
      displayName: Lower Env User Groups
      condition: and(not(failed()), not(canceled()))
      variables:
        - group: "${{ parameters.environmentName }}"
        - template: "/pipelines/vars/common.yaml"
        - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"
      jobs:
        - job: TeamGroups
          displayName: Team Groups
          condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
          steps:
            - checkout: self

            - task: AzureCLI@2
              name: AdminsGroup
              env:
                GROUP_NAME: AAG-Users-IMP-IPAFFS-ProjAdmins
                GROUP_DESCRIPTION: Entra user group for IPAFFS Project Admins
                GROUP_OWNER_OBJECT_IDS: >
                  $(serviceConnectionPrincipalId)
                  $(upstreamServiceConnectionPrincipalId)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/create-entra-group.sh
                scriptArguments: "-u"

            - task: AzureCLI@2
              name: GetAdminsMembers
              env:
                NAMES: $(lowerEnvsAdminsGroupMembers)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/lookup-directory-objects.sh
                scriptArguments: "-o ado -t user"

            - task: AzureCLI@2
              name: DetermineAdminsMemberChanges
              env:
                GROUP_ID: $(AdminsGroup.objectId)
                OBJECT_IDS: $(GetAdminsMembers.objectIds)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/determine-group-members.sh

            - task: AzureCLI@2
              name: AddAdminsMembers
              env:
                GROUP_ID: $(AdminsGroup.objectId)
                GROUP_MEMBERS: $(DetermineAdminsMemberChanges.membersToAdd)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-entra-group-members.sh

            - task: AzureCLI@2
              name: RemoveAdminsMembers
              env:
                GROUP_ID: $(AdminsGroup.objectId)
                GROUP_MEMBERS: $(DetermineAdminsMemberChanges.membersToRemove)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/remove-entra-group-members.sh

            - task: AzureCLI@2
              name: DevelopersGroup
              env:
                GROUP_NAME: AAG-Users-IMP-IPAFFS-Developers
                GROUP_DESCRIPTION: Entra user group for IPAFFS Developers
                GROUP_OWNER_OBJECT_IDS: >
                  $(serviceConnectionPrincipalId)
                  $(upstreamServiceConnectionPrincipalId)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/create-entra-group.sh
                scriptArguments: "-u"

            - task: AzureCLI@2
              name: GetDevelopersMembers
              env:
                NAMES: $(lowerEnvsDevelopersGroupMembers)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/lookup-directory-objects.sh
                scriptArguments: "-o ado -t user"

            - task: AzureCLI@2
              name: DetermineDevelopersMemberChanges
              env:
                GROUP_ID: $(DevelopersGroup.objectId)
                OBJECT_IDS: $(GetDevelopersMembers.objectIds)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/determine-group-members.sh

            - task: AzureCLI@2
              name: AddDevelopersMembers
              env:
                GROUP_ID: $(DevelopersGroup.objectId)
                GROUP_MEMBERS: $(DetermineDevelopersMemberChanges.membersToAdd)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-entra-group-members.sh

            - task: AzureCLI@2
              name: RemoveDevelopersMembers
              env:
                GROUP_ID: $(DevelopersGroup.objectId)
                GROUP_MEMBERS: $(DetermineDevelopersMemberChanges.membersToRemove)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/remove-entra-group-members.sh

            - task: AzureCLI@2
              name: ReadersGroup
              env:
                GROUP_NAME: AAG-Users-IMP-IPAFFS-Readers
                GROUP_DESCRIPTION: Entra user group for IPAFFS Readers
                GROUP_OWNER_OBJECT_IDS: >
                  $(serviceConnectionPrincipalId)
                  $(upstreamServiceConnectionPrincipalId)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/create-entra-group.sh
                scriptArguments: "-u"

            - task: AzureCLI@2
              name: GetReadersMembers
              env:
                NAMES: $(lowerEnvsReadersGroupMembers)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/lookup-directory-objects.sh
                scriptArguments: "-o ado -t user"

            - task: AzureCLI@2
              name: DetermineReadersMemberChanges
              env:
                GROUP_ID: $(ReadersGroup.objectId)
                OBJECT_IDS: $(GetReadersMembers.objectIds)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/determine-group-members.sh

            - task: AzureCLI@2
              name: AddReadersMembers
              env:
                GROUP_ID: $(ReadersGroup.objectId)
                GROUP_MEMBERS: $(DetermineReadersMemberChanges.membersToAdd)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-entra-group-members.sh

            - task: AzureCLI@2
              name: RemoveReadersMembers
              env:
                GROUP_ID: $(ReadersGroup.objectId)
                GROUP_MEMBERS: $(DetermineReadersMemberChanges.membersToRemove)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/remove-entra-group-members.sh

        - job: SaveTeamGroups
          displayName: Update group variables
          condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
          dependsOn:
            - TeamGroups
          variables:
            - name: adoGroupName
              value: LowerEnvs
            - name: teamAdminsDisplayName
              value: $[dependencies.TeamGroups.outputs['AdminsGroup.displayName']]
            - name: teamAdminsObjectId
              value: $[dependencies.TeamGroups.outputs['AdminsGroup.objectId']]
            - name: teamDevelopersDisplayName
              value: $[dependencies.TeamGroups.outputs['DevelopersGroup.displayName']]
            - name: teamDevelopersObjectId
              value: $[dependencies.TeamGroups.outputs['DevelopersGroup.objectId']]
            - name: teamReadersDisplayName
              value: $[dependencies.TeamGroups.outputs['ReadersGroup.displayName']]
            - name: teamReadersObjectId
              value: $[dependencies.TeamGroups.outputs['ReadersGroup.objectId']]
          steps:
            - checkout: self

            - task: Bash@3
              name: StoreLibraryVars
              displayName: Store Library Variables
              env:
                ADO_ORG_URL: $(System.CollectionUri)
                ADO_PROJECT: $(System.TeamProject)
                ADO_GROUP_NAME: $(adoGroupName)
                AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
              inputs:
                targetType: inline
                script: |
                  set -x
                  scripts/pipeline/update-group-variable.sh teamAdminsGroupId '$(teamAdminsObjectId)'
                  scripts/pipeline/update-group-variable.sh teamAdminsGroupName '$(teamAdminsDisplayName)'
                  scripts/pipeline/update-group-variable.sh teamDevelopersGroupId '$(teamDevelopersObjectId)'
                  scripts/pipeline/update-group-variable.sh teamDevelopersGroupName '$(teamDevelopersDisplayName)'
                  scripts/pipeline/update-group-variable.sh teamReadersGroupId '$(teamReadersObjectId)'
                  scripts/pipeline/update-group-variable.sh teamReadersGroupName '$(teamReadersDisplayName)'


  - ${{ if eq(parameters.environmentName, 'PRD') }}:
    - stage: CreateUserGroups
      displayName: Higher Env User Groups
      condition: and(not(failed()), not(canceled()))
      variables:
        - group: "${{ parameters.environmentName }}"
        - template: "/pipelines/vars/common.yaml"
        - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"
      jobs:
        - job: TeamGroups
          displayName: Team Groups
          condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
          steps:
            - checkout: self

            - task: AzureCLI@2
              name: ReadersGroup
              env:
                GROUP_NAME: AAG-Users-IMP-IPAFFS-Readers_Admin
                GROUP_DESCRIPTION: Entra user group for IPAFFS Readers
                GROUP_OWNER_OBJECT_IDS: >
                  $(serviceConnectionPrincipalId)
                  $(upstreamServiceConnectionPrincipalId)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/create-entra-group.sh
                scriptArguments: "-u"

            - task: AzureCLI@2
              name: GetReadersMembers
              env:
                NAMES: $(higherEnvsReadersGroupMembers)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/lookup-directory-objects.sh
                scriptArguments: "-o ado -t user"

            - task: AzureCLI@2
              name: DetermineReadersMemberChanges
              env:
                GROUP_ID: $(ReadersGroup.objectId)
                OBJECT_IDS: $(GetReadersMembers.objectIds)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/determine-group-members.sh

            - task: AzureCLI@2
              name: AddReadersMembers
              env:
                GROUP_ID: $(ReadersGroup.objectId)
                GROUP_MEMBERS: $(DetermineReadersMemberChanges.membersToAdd)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-entra-group-members.sh

            - task: AzureCLI@2
              name: RemoveReadersMembers
              env:
                GROUP_ID: $(ReadersGroup.objectId)
                GROUP_MEMBERS: $(DetermineReadersMemberChanges.membersToRemove)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/remove-entra-group-members.sh

        - job: SaveTeamGroups
          displayName: Update group variables
          condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
          dependsOn:
            - TeamGroups
          variables:
            - name: adoGroupName
              value: HigherEnvs
            - name: teamAdminsDisplayName
              value: $[dependencies.TeamGroups.outputs['AdminsGroup.displayName']]
            - name: teamAdminsObjectId
              value: $[dependencies.TeamGroups.outputs['AdminsGroup.objectId']]
            - name: teamDevelopersDisplayName
              value: $[dependencies.TeamGroups.outputs['DevelopersGroup.displayName']]
            - name: teamDevelopersObjectId
              value: $[dependencies.TeamGroups.outputs['DevelopersGroup.objectId']]
            - name: teamReadersDisplayName
              value: $[dependencies.TeamGroups.outputs['ReadersGroup.displayName']]
            - name: teamReadersObjectId
              value: $[dependencies.TeamGroups.outputs['ReadersGroup.objectId']]
          steps:
            - checkout: self

            - task: Bash@3
              name: StoreLibraryVars
              displayName: Store Library Variables
              env:
                ADO_ORG_URL: $(System.CollectionUri)
                ADO_PROJECT: $(System.TeamProject)
                ADO_GROUP_NAME: $(adoGroupName)
                AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
              inputs:
                targetType: inline
                script: |
                  set -x
                  scripts/pipeline/update-group-variable.sh teamReadersGroupId '$(teamReadersObjectId)'
                  scripts/pipeline/update-group-variable.sh teamReadersGroupName '$(teamReadersDisplayName)'


  - ${{ if or(eq(parameters.environmentName, 'DEV'), eq(parameters.environmentName, 'PRD')) }}:
    - stage: CreateCommonAccessGroups
      displayName: Create Common Entra Access Groups
      condition: and(not(failed()), not(canceled()))
      variables:
        - group: "${{ parameters.environmentName }}"
        - ${{ if eq(parameters.environmentName, 'PRD') }}:
          - group: HigherEnvs
        - ${{ else }}:
          - group: LowerEnvs
        - template: "/pipelines/vars/common.yaml"
        - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"
      jobs:
        - job: ACRGroups
          displayName: ACR Groups
          condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
          steps:
            - checkout: self

            - task: AzureCLI@2
              name: AcrPull
              env:
                GROUP_NAME: AAG-Azure-IMP-${{ parameters.environmentName }}-AcrPull
                GROUP_DESCRIPTION: Entra access group for pulling container images from IPAFFS registry
                GROUP_OWNER_OBJECT_IDS: >
                  $(serviceConnectionPrincipalId)
                  $(upstreamServiceConnectionPrincipalId)
              inputs:
                azureSubscription: $(upstreamServiceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/create-entra-group.sh

            - ${{ if eq(parameters.environmentName, 'DEV') }}:
              - task: AzureCLI@2
                name: AcrPullMembersAdmins
                env:
                  GROUP_ID: $(AcrPull.objectId)
                  PRINCIPAL_ID: $(teamAdminsGroupId)
                inputs:
                  azureSubscription: $(serviceConnection)
                  scriptType: bash
                  scriptPath: scripts/pipeline/add-principal-to-group.sh

              - task: AzureCLI@2
                name: AcrPullMembersDevelopers
                env:
                  GROUP_ID: $(AcrPull.objectId)
                  PRINCIPAL_ID: $(teamDevelopersGroupId)
                inputs:
                  azureSubscription: $(serviceConnection)
                  scriptType: bash
                  scriptPath: scripts/pipeline/add-principal-to-group.sh

            - task: AzureCLI@2
              name: AcrPullMembersReaders
              env:
                GROUP_ID: $(AcrPull.objectId)
                PRINCIPAL_ID: $(teamReadersGroupId)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-principal-to-group.sh

        - job: SaveCommonGroups
          displayName: Update group variables
          condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
          dependsOn:
            - ACRGroups
          variables:
            - name: adoGroupName
              ${{ if eq(parameters.environmentName, 'PRD') }}:
                value: 'HigherEnvs'
              ${{ else }}:
                value: 'LowerEnvs'
            - name: acrPullDisplayName
              value: $[dependencies.ACRGroups.outputs['AcrPull.displayName']]
            - name: acrPullObjectId
              value: $[dependencies.ACRGroups.outputs['AcrPull.objectId']]
          steps:
            - checkout: self

            - task: Bash@3
              name: StoreLibraryVars
              displayName: Store Library Variables
              env:
                ADO_ORG_URL: $(System.CollectionUri)
                ADO_PROJECT: $(System.TeamProject)
                ADO_GROUP_NAME: $(adoGroupName)
                AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
              inputs:
                targetType: inline
                script: |
                  set -x
                  scripts/pipeline/update-group-variable.sh acrPullGroupId '$(acrPullObjectId)'
                  scripts/pipeline/update-group-variable.sh acrPullGroupName '$(acrPullDisplayName)'


  - stage: CreateAccessGroups
    displayName: Create Entra Access Groups
    condition: and(not(failed()), not(canceled()))
    variables:
      - group: "${{ parameters.environmentName }}"
      - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
        - group: HigherEnvs
      - ${{ else }}:
        - group: LowerEnvs
      - template: "/pipelines/vars/common.yaml"
      - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"
    jobs:
      - job: DefraGroups
        displayName: Defra Groups
        condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        steps:
          - checkout: self

          - task: AzureCLI@2
            name: DefraCertificateReaders
            env:
              GROUP_NAME: $(entraAccessGroupBaseName)-AzureCertificateReader
              GROUP_DESCRIPTION: Entra access group for IPAFFS Clusters to retrieve Defra wildcard certificate(s) in ${{ parameters.environmentName }} environment
              GROUP_OWNER_OBJECT_IDS: >
                $(serviceConnectionPrincipalId)
                $(upstreamServiceConnectionPrincipalId)
            inputs:
              azureSubscription: $(upstreamServiceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/create-entra-group.sh

          - ${{ if and(ne(parameters.environmentName, 'PRE'), ne(parameters.environmentName, 'PRD')) }}:
            - task: AzureCLI@2
              name: DefraCertificateReadersMembersAdmins
              env:
                GROUP_ID: $(defraCertificateReadersGroupId)
                PRINCIPAL_ID: $(teamAdminsGroupId)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-principal-to-group.sh

      - job: AksGroups
        displayName: AKS Groups
        condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        steps:
          - checkout: self

          - task: AzureCLI@2
            name: AksAdmins
            env:
              GROUP_NAME: $(entraAccessGroupBaseName)-AksAdmin
              GROUP_DESCRIPTION: Entra access group for IPAFFS AKS Administrators in ${{ parameters.environmentName }} environment
              GROUP_OWNER_OBJECT_IDS: >
                $(serviceConnectionPrincipalId)
                $(upstreamServiceConnectionPrincipalId)
            inputs:
              azureSubscription: $(upstreamServiceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/create-entra-group.sh

          - task: AzureCLI@2
            name: AksAdminsMembersServiceConnectionPrincipal
            env:
              GROUP_ID: $(AksAdmins.objectId)
              PRINCIPAL_ID: $(serviceConnectionPrincipalId)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/add-principal-to-group.sh

          - ${{ if and(ne(parameters.environmentName, 'PRE'), ne(parameters.environmentName, 'PRD')) }}:
            - task: AzureCLI@2
              name: AksAdminsMembersAdmins
              env:
                GROUP_ID: $(AksAdmins.objectId)
                PRINCIPAL_ID: $(teamAdminsGroupId)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-principal-to-group.sh

          - task: AzureCLI@2
            name: AksContributors
            env:
              GROUP_NAME: $(entraAccessGroupBaseName)-AksContrib
              GROUP_DESCRIPTION: Entra access group for IPAFFS AKS Contributors in ${{ parameters.environmentName }} environment
              GROUP_OWNER_OBJECT_IDS: >
                $(serviceConnectionPrincipalId)
                $(upstreamServiceConnectionPrincipalId)
            inputs:
              azureSubscription: $(upstreamServiceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/create-entra-group.sh

          - ${{ if and(ne(parameters.environmentName, 'PRE'), ne(parameters.environmentName, 'PRD')) }}:
            - task: AzureCLI@2
              name: AksContributorsMembersDevelopers
              env:
                GROUP_ID: $(AksContributors.objectId)
                PRINCIPAL_ID: $(teamDevelopersGroupId)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-principal-to-group.sh

          - task: AzureCLI@2
            name: AksReaders
            env:
              GROUP_NAME: $(entraAccessGroupBaseName)-AksReader
              GROUP_DESCRIPTION: Entra access group for IPAFFS AKS Readers in ${{ parameters.environmentName }} environment
              GROUP_OWNER_OBJECT_IDS: >
                $(serviceConnectionPrincipalId)
                $(upstreamServiceConnectionPrincipalId)
            inputs:
              azureSubscription: $(upstreamServiceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/create-entra-group.sh

          - task: AzureCLI@2
            name: AksReadersMembersReaders
            env:
              GROUP_ID: $(AksReaders.objectId)
              PRINCIPAL_ID: $(teamReadersGroupId)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/add-principal-to-group.sh

      - job: KeyVaultGroups
        displayName: KeyVault Groups
        condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        steps:
          - checkout: self

          - task: AzureCLI@2
            name: KeyVaultAdmins
            env:
              GROUP_NAME: $(entraAccessGroupBaseName)-KeyVaultAdmin
              GROUP_DESCRIPTION: Entra access group for IPAFFS KeyVault Administrators in ${{ parameters.environmentName }} environment
              GROUP_OWNER_OBJECT_IDS: >
                $(serviceConnectionPrincipalId)
                $(upstreamServiceConnectionPrincipalId)
            inputs:
              azureSubscription: $(upstreamServiceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/create-entra-group.sh

          - ${{ if and(ne(parameters.environmentName, 'PRE'), ne(parameters.environmentName, 'PRD')) }}:
            - task: AzureCLI@2
              name: KeyVaultAdminsMembersAdmins
              env:
                GROUP_ID: $(KeyVaultAdmins.objectId)
                PRINCIPAL_ID: $(teamAdminsGroupId)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-principal-to-group.sh

          - task: AzureCLI@2
            name: KeyVaultSecretsReader
            env:
              GROUP_NAME: $(entraAccessGroupBaseName)-KeyVaultSecretsReader
              GROUP_DESCRIPTION: Entra access group for IPAFFS KeyVault Secrets Readers in ${{ parameters.environmentName }} environment
              GROUP_OWNER_OBJECT_IDS: >
                $(serviceConnectionPrincipalId)
                $(upstreamServiceConnectionPrincipalId)
            inputs:
              azureSubscription: $(upstreamServiceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/create-entra-group.sh

          - ${{ if and(ne(parameters.environmentName, 'PRE'), ne(parameters.environmentName, 'PRD')) }}:
            - task: AzureCLI@2
              name: KeyVaultSecretsReaderMembersDevelopers
              env:
                GROUP_ID: $(KeyVaultSecretsReader.objectId)
                PRINCIPAL_ID: $(teamDevelopersGroupId)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-principal-to-group.sh

          - task: AzureCLI@2
            name: KeyVaultSecretsReaderMembersReaders
            env:
              GROUP_ID: $(KeyVaultSecretsReader.objectId)
              PRINCIPAL_ID: $(teamReadersGroupId)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/add-principal-to-group.sh

      - job: SearchGroups
        displayName: Search Service Groups
        condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        steps:
          - checkout: self

          - task: AzureCLI@2
            name: SearchContributors
            env:
              GROUP_NAME: $(entraAccessGroupBaseName)-SearchContrib
              GROUP_DESCRIPTION: Entra access group for IPAFFS Search Services Contributors in ${{ parameters.environmentName }} environment
              GROUP_OWNER_OBJECT_IDS: >
                $(serviceConnectionPrincipalId)
                $(upstreamServiceConnectionPrincipalId)
            inputs:
              azureSubscription: $(upstreamServiceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/create-entra-group.sh

          - ${{ if and(ne(parameters.environmentName, 'PRE'), ne(parameters.environmentName, 'PRD')) }}:
            - task: AzureCLI@2
              name: SearchContributorsMembersAdmins
              env:
                GROUP_ID: $(SearchContributors.objectId)
                PRINCIPAL_ID: $(teamAdminsGroupId)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-principal-to-group.sh

            - task: AzureCLI@2
              name: SearchContributorsMembersDevelopers
              env:
                GROUP_ID: $(SearchContributors.objectId)
                PRINCIPAL_ID: $(teamDevelopersGroupId)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-principal-to-group.sh

          - task: AzureCLI@2
            name: SearchReaders
            env:
              GROUP_NAME: $(entraAccessGroupBaseName)-SearchReader
              GROUP_DESCRIPTION: Entra access group for IPAFFS Search Services Readers in ${{ parameters.environmentName }} environment
              GROUP_OWNER_OBJECT_IDS: >
                $(serviceConnectionPrincipalId)
                $(upstreamServiceConnectionPrincipalId)
            inputs:
              azureSubscription: $(upstreamServiceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/create-entra-group.sh

          - task: AzureCLI@2
            name: SearchReadersMembersReaders
            env:
              GROUP_ID: $(SearchReaders.objectId)
              PRINCIPAL_ID: $(teamReadersGroupId)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/add-principal-to-group.sh

      - job: StorageGroups
        displayName: Storage Account Groups
        condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        steps:
          - checkout: self

          - task: AzureCLI@2
            name: BlobStorageContributors
            env:
              GROUP_NAME: $(entraAccessGroupBaseName)-BlobStorageContrib
              GROUP_DESCRIPTION: Entra access group for IPAFFS Blob Storage Contributors in ${{ parameters.environmentName }} environment
              GROUP_OWNER_OBJECT_IDS: >
                $(serviceConnectionPrincipalId)
                $(upstreamServiceConnectionPrincipalId)
            inputs:
              azureSubscription: $(upstreamServiceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/create-entra-group.sh

          - ${{ if and(ne(parameters.environmentName, 'PRE'), ne(parameters.environmentName, 'PRD')) }}:
            - task: AzureCLI@2
              name: BlobStorageContributorsMembersAdmins
              env:
                GROUP_ID: $(BlobStorageContributors.objectId)
                PRINCIPAL_ID: $(teamAdminsGroupId)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-principal-to-group.sh

            - task: AzureCLI@2
              name: BlobStorageContributorsMembersDevelopers
              env:
                GROUP_ID: $(BlobStorageContributors.objectId)
                PRINCIPAL_ID: $(teamDevelopersGroupId)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-principal-to-group.sh

          - task: AzureCLI@2
            name: BlobStorageReaders
            env:
              GROUP_NAME: $(entraAccessGroupBaseName)-BlobStorageReader
              GROUP_DESCRIPTION: Entra access group for IPAFFS Blob Storage Readers in ${{ parameters.environmentName }} environment
              GROUP_OWNER_OBJECT_IDS: >
                $(serviceConnectionPrincipalId)
                $(upstreamServiceConnectionPrincipalId)
            inputs:
              azureSubscription: $(upstreamServiceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/create-entra-group.sh

          - task: AzureCLI@2
            name: BlobStorageReadersMembersReaders
            env:
              GROUP_ID: $(BlobStorageReaders.objectId)
              PRINCIPAL_ID: $(teamReadersGroupId)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/add-principal-to-group.sh


      - job: SQLGroups
        displayName: SQL Groups
        condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        steps:
          - checkout: self

          - task: AzureCLI@2
            name: SQLAdmins
            env:
              GROUP_NAME: $(entraAccessGroupBaseName)-SQLAdmins
              GROUP_DESCRIPTION: Entra access group for IPAFFS SQL Admins
              GROUP_OWNER_OBJECT_IDS: >
                $(serviceConnectionPrincipalId)
                $(upstreamServiceConnectionPrincipalId)
            inputs:
              azureSubscription: $(upstreamServiceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/create-entra-group.sh

          - ${{ if and(ne(parameters.environmentName, 'PRE'), ne(parameters.environmentName, 'PRD')) }}:
            - task: AzureCLI@2
              name: SQLAdminsMembersAdmins
              env:
                GROUP_ID: $(SQLAdmins.objectId)
                PRINCIPAL_ID: $(teamAdminsGroupId)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-principal-to-group.sh

            - task: AzureCLI@2
              name: SQLAdminsMembersDevelopers
              env:
                GROUP_ID: $(SQLAdmins.objectId)
                PRINCIPAL_ID: $(teamDevelopersGroupId)
              inputs:
                azureSubscription: $(serviceConnection)
                scriptType: bash
                scriptPath: scripts/pipeline/add-principal-to-group.sh

          - task: AzureCLI@2
            name: SQLAdminsMemberClassicAdminUser
            condition: and(not(failed()), not(canceled()), ne(variables['classicSqlAdminUserPrincipalObjectId'], ''))
            env:
              GROUP_ID: $(SQLAdmins.objectId)
              PRINCIPAL_ID: $(classicSqlAdminUserPrincipalObjectId)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptPath: scripts/pipeline/add-principal-to-group.sh


      - job: SaveAccessGroups
        displayName: Update group variables
        condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        dependsOn:
          - DefraGroups
          - AksGroups
          - KeyVaultGroups
          - SearchGroups
          - StorageGroups
          - SQLGroups
        variables:
          - group: "${{ parameters.environmentName }}"
          - template: "/pipelines/vars/common.yaml"
          - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"
          - name: defraCertificateReadersDisplayName
            value: $[dependencies.DefraGroups.outputs['DefraCertificateReaders.displayName']]
          - name: defraCertificateReadersObjectId
            value: $[dependencies.DefraGroups.outputs['DefraCertificateReaders.objectId']]
          - name: aksAdminsDisplayName
            value: $[dependencies.AksGroups.outputs['AksAdmins.displayName']]
          - name: aksAdminsObjectId
            value: $[dependencies.AksGroups.outputs['AksAdmins.objectId']]
          - name: aksContributorsDisplayName
            value: $[dependencies.AksGroups.outputs['AksContributors.displayName']]
          - name: aksContributorsObjectId
            value: $[dependencies.AksGroups.outputs['AksContributors.objectId']]
          - name: aksReadersDisplayName
            value: $[dependencies.AksGroups.outputs['AksReaders.displayName']]
          - name: aksReadersObjectId
            value: $[dependencies.AksGroups.outputs['AksReaders.objectId']]
          - name: keyVaultAdminsDisplayName
            value: $[dependencies.KeyVaultGroups.outputs['KeyVaultAdmins.displayName']]
          - name: keyVaultAdminsObjectId
            value: $[dependencies.KeyVaultGroups.outputs['KeyVaultAdmins.objectId']]
          - name: keyVaultSecretsReaderDisplayName
            value: $[dependencies.KeyVaultGroups.outputs['KeyVaultSecretsReader.displayName']]
          - name: keyVaultSecretsReaderObjectId
            value: $[dependencies.KeyVaultGroups.outputs['KeyVaultSecretsReader.objectId']]
          - name: searchContributorsDisplayName
            value: $[dependencies.SearchGroups.outputs['SearchContributors.displayName']]
          - name: searchContributorsObjectId
            value: $[dependencies.SearchGroups.outputs['SearchContributors.objectId']]
          - name: searchReadersDisplayName
            value: $[dependencies.SearchGroups.outputs['SearchReaders.displayName']]
          - name: searchReadersObjectId
            value: $[dependencies.SearchGroups.outputs['SearchReaders.objectId']]
          - name: blobStorageContributorsDisplayName
            value: $[dependencies.StorageGroups.outputs['BlobStorageContributors.displayName']]
          - name: blobStorageContributorsObjectId
            value: $[dependencies.StorageGroups.outputs['BlobStorageContributors.objectId']]
          - name: blobStorageReadersDisplayName
            value: $[dependencies.StorageGroups.outputs['BlobStorageReaders.displayName']]
          - name: blobStorageReadersObjectId
            value: $[dependencies.StorageGroups.outputs['BlobStorageReaders.objectId']]
          - name: sqlAdminsDisplayName
            value: $[dependencies.SQLGroups.outputs['SQLAdmins.displayName']]
          - name: sqlAdminsObjectId
            value: $[dependencies.SQLGroups.outputs['SQLAdmins.objectId']]
        steps:
          - checkout: self

          - task: Bash@3
            name: StoreLibraryVars
            displayName: Store Library Variables
            condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
            env:
              ADO_ORG_URL: $(System.CollectionUri)
              ADO_PROJECT: $(System.TeamProject)
              ADO_GROUP_NAME: ${{ parameters.environmentName }}
              AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
            inputs:
              targetType: inline
              script: |
                set -x
                scripts/pipeline/update-group-variable.sh defraCertificateReadersGroupId '$(defraCertificateReadersObjectId)'
                scripts/pipeline/update-group-variable.sh defraCertificateReadersGroupName '$(defraCertificateReadersDisplayName)'
                scripts/pipeline/update-group-variable.sh aksAdminsGroupId '$(aksAdminsObjectId)'
                scripts/pipeline/update-group-variable.sh aksAdminsGroupName '$(aksAdminsDisplayName)'
                scripts/pipeline/update-group-variable.sh aksContributorsGroupId '$(aksContributorsObjectId)'
                scripts/pipeline/update-group-variable.sh aksContributorsGroupName '$(aksContributorsDisplayName)'
                scripts/pipeline/update-group-variable.sh aksReadersGroupId '$(aksReadersObjectId)'
                scripts/pipeline/update-group-variable.sh aksReadersGroupName '$(aksReadersDisplayName)'
                scripts/pipeline/update-group-variable.sh keyVaultAdminsGroupId '$(keyVaultAdminsObjectId)'
                scripts/pipeline/update-group-variable.sh keyVaultAdminsGroupName '$(keyVaultAdminsDisplayName)'
                scripts/pipeline/update-group-variable.sh keyVaultSecretsReadersGroupId '$(keyVaultSecretsReaderObjectId)'
                scripts/pipeline/update-group-variable.sh keyVaultSecretsReadersGroupName '$(keyVaultSecretsReaderDisplayName)'
                scripts/pipeline/update-group-variable.sh searchContributorsGroupId '$(searchContributorsObjectId)'
                scripts/pipeline/update-group-variable.sh searchContributorsGroupName '$(searchContributorsDisplayName)'
                scripts/pipeline/update-group-variable.sh searchReadersGroupId '$(searchReadersObjectId)'
                scripts/pipeline/update-group-variable.sh searchReadersGroupName '$(searchReadersDisplayName)'
                scripts/pipeline/update-group-variable.sh blobStorageContributorsGroupId '$(blobStorageContributorsObjectId)'
                scripts/pipeline/update-group-variable.sh blobStorageContributorsGroupName '$(blobStorageContributorsDisplayName)'
                scripts/pipeline/update-group-variable.sh blobStorageReadersGroupId '$(blobStorageReadersObjectId)'
                scripts/pipeline/update-group-variable.sh blobStorageReadersGroupName '$(blobStorageReadersDisplayName)'
                scripts/pipeline/update-group-variable.sh sqlAdminGroupId '$(sqlAdminsObjectId)'
                scripts/pipeline/update-group-variable.sh sqlAdminGroupName '$(sqlAdminsDisplayName)'

