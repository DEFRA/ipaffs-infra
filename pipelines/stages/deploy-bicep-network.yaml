parameters:
  - name: environmentName
    type: string

stages:
  - stage: DeployNetwork
    displayName: Deploy Network
    variables:
      - group: "${{ parameters.environmentName }}"
      - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
        - group: HigherEnvs
      - ${{ else }}:
        - group: LowerEnvs
      - template: "/pipelines/vars/common.yaml"
      - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"
    jobs:
      - deployment: RunBicep
        displayName: Run Bicep
        environment:
          name: "${{ parameters.environmentName }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: WhatIf - Network
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -x
                      az deployment group what-if \
                        --name "Network-$(Build.BuildId)" \
                        --subscription $(subscriptionId) \
                        --resource-group $(resourceGroupName) \
                        --template-file bicep/20-network.bicep \
                        --parameters bicep/envs/${{ lower(parameters.environmentName) }}/20-network.bicepparam

                - task: AzureCLI@2
                  displayName: Deploy - Network
                  condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -x
                      az deployment group create \
                        --name "Network-$(Build.BuildId)" \
                        --subscription $(subscriptionId) \
                        --resource-group $(resourceGroupName) \
                        --template-file bicep/20-network.bicep \
                        --parameters bicep/envs/${{ lower(parameters.environmentName) }}/20-network.bicepparam

                - task: AzureCLI@2
                  displayName: Wait for Deployment - Network
                  condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -x
                      az deployment group wait \
                        --name "Network-$(Build.BuildId)" \
                        --subscription $(subscriptionId) \
                        --resource-group $(resourceGroupName) \
                        --created


  - stage: SaveNetworkDeploymentDetails
    displayName: Save network deployment details
    dependsOn: DeployNetwork
    variables:
      - group: "${{ parameters.environmentName }}"
      - ${{ if or(eq(parameters.environmentName, 'PRD'), eq(parameters.environmentName, 'PRE')) }}:
        - group: HigherEnvs
      - ${{ else }}:
        - group: LowerEnvs
      - template: "/pipelines/vars/common.yaml"
      - template: "/pipelines/vars/${{ lower(parameters.environmentName) }}.yaml"
    jobs:
      - job: StoreLibraryVariables
        displayName: Store library variables
        steps:
          - checkout: self

          - task: AzureCLI@2
            name: NetworkOutputs
            displayName: Network outputs
            condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
            env:
              ADO_ORG_URL: $(System.CollectionUri)
              ADO_PROJECT: $(System.TeamProject)
              ADO_GROUP_NAME: ${{ parameters.environmentName }}
              AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
              DEPLOYMENT_NAME: Network-$(Build.BuildId)
              RESOURCE_GROUP: $(resourceGroupName)
              SUBSCRIPTION_ID: $(subscriptionId)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -x
                scripts/pipeline/update-group-variable-from-deployment.sh aksApiServerSubnetId aksApiServerSubnetId
                scripts/pipeline/update-group-variable-from-deployment.sh aksApiServerSubnetName aksApiServerSubnetName
                scripts/pipeline/update-group-variable-from-deployment.sh aksSystemNodesSubnetId aksSystemNodesSubnetId
                scripts/pipeline/update-group-variable-from-deployment.sh aksSystemNodesSubnetName aksSystemNodesSubnetName
                scripts/pipeline/update-group-variable-from-deployment.sh aksUserNodesSubnetId aksUserNodesSubnetId
                scripts/pipeline/update-group-variable-from-deployment.sh aksUserNodesSubnetName aksUserNodesSubnetName
                scripts/pipeline/update-group-variable-from-deployment.sh appGatewayForContainersSubnetId appGatewayForContainersSubnetId
                scripts/pipeline/update-group-variable-from-deployment.sh appGatewayForContainersSubnetName appGatewayForContainersSubnetName
                scripts/pipeline/update-group-variable-from-deployment.sh privateEndpointsSubnetId privateEndpointsSubnetId
                scripts/pipeline/update-group-variable-from-deployment.sh privateEndpointsSubnetName privateEndpointsSubnetName
                scripts/pipeline/update-group-variable-from-deployment.sh vnetName vnetName

