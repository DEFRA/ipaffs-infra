---
pool:
  name: DEFRA-COMMON-ubuntu2204-SSV5

parameters:
  - name: environmentName
    type: string
    default: PRE
    values:
      - PRE

stages:
  - stage: Deploy
    jobs:
      - deployment: Deploy
        environment:
          name: "${{ parameters.environmentName }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Deploy
                  inputs:
                    azureSubscription: ADO-DefraGovUK-AZR-IMP-PRD1
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az role assignment create \
                        --role Owner \
                        --assignee-object-id 29224d1d-02b9-40ad-9a06-0f71087233b9 \
                        --assignee-principal-type User \
                        --scope /subscriptions/5f38dc6f-69b9-4d1b-9000-7e0b8277e515/resourceGroups/PRDIMPINFRG1401

# vim: set ts=2 sts=2 sw=2 et:
