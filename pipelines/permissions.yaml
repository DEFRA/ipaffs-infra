---
trigger:
  branches:
    include:
      - permissions
  paths:
    include:
      - bicep/permissions.bicep
      - bicep/**/permissions.parameters.json
      - pipelines/permissions.yaml

pool:
  name: DEFRA-COMMON-ubuntu2204-SSV5

variables:
  - group: "${{ parameters.environmentName }}"

parameters:
  - name: environmentName
    type: string
    default: POC
    values:
      - POC
      - TST
      - PRE

stages:
  - stage: Deploy
    jobs:
      - deployment: Deploy
        environment:
          name: "${{ parameters.environmentName }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Deploy
                  inputs:
                    azureSubscription: ADO-DefraGovUK-AZR-PRE_IMP
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az role assignment create \
                        --role Contributor \
                        --assignee-object-id 80a5fda0-7d36-4c3a-a5de-44a6a525fd2d \
                        --assignee-principal-type Group \
                        --scope /subscriptions/81ca326e-6270-418a-b764-e02a4ca60457/resourceGroups/PREIMPINFRGP001

# vim: set ts=2 sts=2 sw=2 et:
