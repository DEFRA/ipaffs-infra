---
pool:
  name: DEFRA-COMMON-ubuntu2204-SSV5

parameters:
  - name: environmentName
    type: string
    default: PRE
    values:
      - PRE

stages:
  - stage: Deploy
    jobs:
      - deployment: Deploy
        environment:
          name: "${{ parameters.environmentName }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Deploy
                  inputs:
                    azureSubscription: ADO-DefraGovUK-AZR-IMP-PRE1
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az role assignment create \
                        --role Owner \
                        --assignee-object-id 29224d1d-02b9-40ad-9a06-0f71087233b9 \
                        --assignee-principal-type User \
                        --scope /subscriptions/3978eb4f-add1-415d-839b-db398e65a7d9/resourceGroups/PREIMPINFRG1401

