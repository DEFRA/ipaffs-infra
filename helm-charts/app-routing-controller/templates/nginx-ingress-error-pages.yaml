apiVersion: v1
kind: ConfigMap
metadata:
  name: error-page
  namespace: app-routing-system
data:
  index.html: |-
{{ .Files.Get "files/index.html" | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: error-page
  namespace: app-routing-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: error-page
  template:
    metadata:
      labels:
        app: error-page
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: error-page
---
apiVersion: v1
kind: Service
metadata:
  name: error-page
  namespace: app-routing-system
spec:
  selector:
    app: error-page
  ports:
    - port: 80
      targetPort: 80
