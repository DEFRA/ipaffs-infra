{{- $config := default dict .Values.ipaffsConfig }}
{{- $configData := default dict $config.data }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ipaffs-config
  labels:
    {{- include "ipaffs-common.labels" . | nindent 4 }}
data:
  IPAFFS_URL_B2B: {{ include "ipaffs-common.ipaffsUrlB2b" . | quote }}
  IPAFFS_URL_B2C: {{ include "ipaffs-common.ipaffsUrlB2c" . | quote }}
  IPAFFS_DOMAIN_B2C: {{ urlParse (include "ipaffs-common.ipaffsUrlB2c" .).hostname | quote }}
  NAMESPACE: {{ .Release.Namespace | quote }}
{{- if $configData }}
{{- range $key, $value := $configData }}
  {{ $key }}: {{ $value | toString | quote }}
{{- end }}
{{- end }}

