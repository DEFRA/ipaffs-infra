{{- if eq .Values.environment "dev" }}

{{- $hosts := trim (include "ipaffs-common.ingressOriginHosts" .) }}
{{- if not (empty $hosts) }}
{{- $hostsList := splitList "\n" $hosts }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: origin
  labels:
    {{- include "ipaffs-common.labels" . | nindent 4 }}
  {{- with .Values.originIngress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Original-Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
spec:
  ingressClassName: nginx
  tls:
    {{- range $hostsList }}
    - hosts:
        - {{ . | quote }}
      secretName: ipaffs-tls
    {{- end }}
  rules:
    {{- range $hostsList }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: proxy
                port:
                  number: 80
    {{- end }}
{{- end }}

{{- end }}
