{{- if eq .Values.environment "dev" }}

{{- $root := . }}
{{- $serviceBus := default (dict "queues" (list) "topics" (list)) $root.Values.serviceBus }}

apiVersion: servicebus.azure.com/v1api20240101
kind: Namespace
metadata:
  name: {{ template "ipaffs-common.azure.serviceBusNamespace" $root }}
  labels:
    {{- include "ipaffs-common.labels" $root | nindent 4 }}
  annotations:
    serviceoperator.azure.com/reconcile-policy: manage
spec:
  location: {{ $root.Values.azure.location }}
  minimumTlsVersion: "1.2"
  owner:
    name: {{ template "ipaffs-common.azure.resourceGroup" $root }}
  sku:
    name: Standard
  zoneRedundant: false

{{- range $serviceBus.queues }}
---
apiVersion: servicebus.azure.com/v1api20240101
kind: NamespacesQueue
metadata:
  name: {{ . }}
  labels:
    {{- include "ipaffs-common.labels" $root | nindent 4 }}
  annotations:
    serviceoperator.azure.com/reconcile-policy: manage
spec:
  owner:
    name: {{ template "ipaffs-common.azure.serviceBusNamespace" $root }}

{{- end }}

{{- range $topic := $serviceBus.topics }}
{{- $topicName := $topic }}
{{- $topicSubscriptions := list }}
{{- if kindIs "map" $topic }}
{{- $topicName = required "serviceBus.topics[].name is required when topic is an object" $topic.name }}
{{- $topicSubscriptions = default (list) $topic.subscriptions }}
{{- end }}
---
apiVersion: servicebus.azure.com/v1api20240101
kind: NamespacesTopic
metadata:
  name: {{ $topicName }}
  labels:
    {{- include "ipaffs-common.labels" $root | nindent 4 }}
  annotations:
    serviceoperator.azure.com/reconcile-policy: manage
spec:
  owner:
    name: {{ template "ipaffs-common.azure.serviceBusNamespace" $root }}

{{- range $topicSubscriptions }}
---
apiVersion: servicebus.azure.com/v1api20240101
kind: NamespacesTopicsSubscription
metadata:
  name: {{ . }}
  labels:
    {{- include "ipaffs-common.labels" $root | nindent 4 }}
  annotations:
    serviceoperator.azure.com/reconcile-policy: manage
spec:
  owner:
    name: {{ $topicName }}

{{- end }}
{{- end }}

{{- end }}
