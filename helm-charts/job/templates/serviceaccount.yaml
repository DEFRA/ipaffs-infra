apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    {{- include "ipaffs-common.labels" . | nindent 4 }}
  {{- $clientId := include "job.azure.serviceClientId" . | trim }}
  {{- if $clientId }}
  annotations:
    azure.workload.identity/client-id: {{ $clientId | quote }}
  {{- end }}
  name: {{ .Values.service }}-service

