{{- if (default false .Values.keda.enabled) }}
{{- $database := default (dict) .Values.database }}
{{- $databaseNames := get $database "databaseNames" | default (list) }}
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: {{ .Values.service }}
  labels:
    {{- include "ipaffs-common.labels" . | nindent 4 }}
    {{- if .Values.deployment.manifestTag }}
    defra.gov.uk/manifest-tag: {{ .Values.deployment.manifestTag | quote }}
    {{- end }}
  {{- if (default false .Values.suspend) }}
  annotations:
    autoscaling.keda.sh/paused: "true"
  {{- end }}
spec:
  pollingInterval: {{ default 30 .Values.keda.pollingInterval }}
  cooldownPeriod: {{ default 300 .Values.keda.cooldownPeriod }}
  maxReplicaCount: {{ default 1 .Values.keda.maxReplicaCount }}
  successfulJobsHistoryLimit: {{ default 1 .Values.keda.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ default 1 .Values.keda.failedJobsHistoryLimit }}
  jobTargetRef:
    backoffLimit: 2 # max pod retries for each run
    template:
      metadata:
        labels:
          {{- include "ipaffs-common.labels" . | nindent 10 }}
          azure.workload.identity/use: "true"
      spec:
        serviceAccountName: {{ .Values.service }}-service
{{- if gt (len $databaseNames) 0 }}
        shareProcessNamespace: true
{{- end }}
        restartPolicy: OnFailure
        containers:
          - name: {{ .Chart.Name }}
            image: "{{ include "job.image.resolve" (dict "root" . "image" .Values.container.image) }}"
            {{ if .Values.container.command }}
            command: ["{{ .Values.container.command }}"]
            {{ end }}
            {{ if .Values.container.args }}
            args:
              {{ range .Values.container.args }}
              - "{{ . }}"
              {{ end }}
            {{ end }}
            imagePullPolicy: {{ .Values.container.imagePullPolicy }}
            {{- with .Values.container.securityContext }}
            securityContext:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            envFrom:
              - configMapRef:
                  name: ipaffs-config
              - configMapRef:
                  name: {{ .Values.service }}
{{- if .Values.externalSecret.enabled }}
              - secretRef:
                  name: {{ printf "%s-secrets" .Values.service }}
                  optional: true
{{- end }}
{{- if .Values.serviceBus.enabled }}
              - secretRef:
                  name: {{ printf "%s-servicebus" .Values.service }}
                  optional: true
{{- end }}
            {{ with .Values.env }}
            env:
              {{- toYaml . | nindent 14 }}
            {{ end }}
            {{- with .Values.resources }}
            resources:
              {{- toYaml . | nindent 14 }}
            {{- end }}
{{- if or (gt (len $databaseNames) 0) .Values.initContainer.enabled }}
        initContainers:
{{- if gt (len $databaseNames) 0 }}
          - name: workload-identity-adal-bridge
            image: "manicminer/workload-identity-adal-bridge:0.4.1"
            restartPolicy: Always
            env:
              - name: LOG_LEVEL
                value: "info"
{{- end }}
{{- if .Values.initContainer.enabled }}
          - name: {{ .Chart.Name }}-init
            image: "{{ include "job.image.resolve" (dict "root" . "image" .Values.initContainer.image) }}"
            command: {{ .Values.initContainer.command }}
            {{- with .Values.initContainer.securityContext }}
            securityContext:
              {{- toYaml . | nindent 14 }}
            {{- end }}
{{- end }}
{{- end }}
  triggers:
    {{- required "keda.triggers must contain at least one trigger when keda.enabled is true" .Values.keda.triggers | toYaml | nindent 4 }}
{{- end }}

