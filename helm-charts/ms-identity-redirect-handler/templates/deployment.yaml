apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-identity-redirect-handler
  labels:
    app.kubernetes.io/name: ms-identity-redirect-handler
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ms-identity-redirect-handler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ms-identity-redirect-handler
    spec:
      containers:
        - name: "{{ .Chart.Name }}"
          image: "{{ .Values.container.image }}"
          {{- if .Values.container.command }}
          command: ["{{ .Values.container.command }}"]
          {{- end }}
          {{- if .Values.container.args }}
          args:
            {{- range .Values.container.args }}
            - "{{ . }}"
            {{- end }}
          {{- end }}
          imagePullPolicy: {{ .Values.container.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

