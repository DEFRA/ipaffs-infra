environment: dev
replicas: 3

container:
  image: manicminer/ms-identity-redirect-handler:v0.1.1
  imagePullPolicy: Always
  securityContext:
    allowPrivilegeEscalation: false

secretStore:
  name: "external-secrets-azure-ccoe"

externalSecret:
  enabled: true
  refreshInterval: 1h
  certs:
    - secretKey: ipaffs-tls
      remoteKey: secret/star-azure-defra-cloud-cert

