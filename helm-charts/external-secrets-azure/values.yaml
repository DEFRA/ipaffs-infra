# Override the generated ClusterSecretStore name. Defaults to the release fullname.
secretStoreNameOverride: ""

# Additional ClusterSecretStores keyed by resource name.
# This lets a single release expose multiple Azure Key Vault stores.
# Example:
# additionalSecretStores:
#   external-secrets-azure-ccoe:
#     vaultUrl: "https://example-bootstrap.vault.azure.net/"
#     tenantId: "00000000-0000-0000-0000-000000000000"
#     authType: WorkloadIdentity
#     identityId: ""
#     serviceAccountRef:
#       name: external-secrets
#       namespace: external-secrets
additionalSecretStores: {}

azure:
  # Required: the Azure Key Vault URI and tenant ID to read secrets from.
  vaultUrl: ""
  tenantId: ""

  # authType can be WorkloadIdentity (default), ManagedIdentity or ServicePrincipal.
  authType: ManagedIdentity

  # identityId is required for WorkloadIdentity (the federated identity client ID)
  # and for ManagedIdentity (the managed identity client ID).
  identityId: ""

  # serviceAccountRef is used for WorkloadIdentity authentication.
  serviceAccountRef:
    name: external-secrets
    namespace: external-secrets

  # Service principal settings when authType is ServicePrincipal.
  servicePrincipal:
    # Name/namespace of the Kubernetes secret containing clientId and clientSecret keys.
    secretName: external-secrets-azure-sp
    secretNamespace: ""
    clientIdKey: clientId
    clientSecretKey: clientSecret

    # Optionally create the secret from the values below (otherwise create it manually).
    createSecret: false
    clientId: ""
    clientSecret: ""
