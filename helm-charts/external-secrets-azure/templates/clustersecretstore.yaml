apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ include "external-secrets-azure.fullname" . }}
spec:
{{ include "external-secrets-azure.azurekvProvider" (dict "root" . "azure" .Values.azure "path" "azure") | nindent 2 }}
{{ $additionalStores := default dict .Values.additionalSecretStores }}
{{ range $storeName := keys $additionalStores | sortAlpha }}
{{ $storeConfig := index $additionalStores $storeName }}
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ $storeName | trunc 63 | trimSuffix "-" }}
spec:
{{ include "external-secrets-azure.azurekvProvider" (dict "root" $ "azure" $storeConfig "path" (printf "additionalSecretStores.%s" $storeName)) | nindent 2 }}
{{ end }}
