{{- $primarySecret := include "external-secrets-azure.servicePrincipalSecret" (dict "root" . "azure" .Values.azure "path" "azure") | trim -}}
{{- if $primarySecret }}
{{ $primarySecret }}
{{- end }}
{{- $additionalStores := default dict .Values.additionalSecretStores -}}
{{- range $storeName := keys $additionalStores | sortAlpha }}
{{- $storeConfig := index $additionalStores $storeName -}}
{{- $extraSecret := include "external-secrets-azure.servicePrincipalSecret" (dict "root" $ "azure" $storeConfig "path" (printf "additionalSecretStores.%s" $storeName)) | trim -}}
{{- if $extraSecret }}
---
{{ $extraSecret }}
{{- end }}
{{- end }}
