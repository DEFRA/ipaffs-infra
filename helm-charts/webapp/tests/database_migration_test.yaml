suite: database migration template
templates:
  - templates/database-migration.yaml
tests:
  - it: does not render migration resources when disabled
    set:
      service: test-service
      database.migrations.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders service account and migration job when enabled
    release:
      namespace: dev
    set:
      service: test-service
      azure.clientId: 00000000-0000-0000-0000-000000000001
      database.principalName: test-service-principal
      database.databaseNames[0]: imports
      database.migrations.enabled: true
      database.migrations.image: test/migrations:1.0.0
      database.migrations.clientId: 00000000-0000-0000-0000-000000000002
      serviceBus.enabled: true
      externalSecret.enabled: true
      redis.enabled: true
      search.enabled: true
      search.serviceName: search-service
      search.principalName: search-principal
      search.subscriptionId: 00000000-0000-0000-0000-000000000003
      search.resourceGroupName: rg-dev
      storage.accountName: mystorage
    asserts:
      - hasDocuments:
          count: 2

  - it: configures migration service account with the migrations client id
    set:
      service: test-service
      database.migrations.enabled: true
      database.migrations.image: test/migrations:1.0.0
      database.migrations.clientId: 00000000-0000-0000-0000-000000000002
    documentIndex: 0
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-service-migrations
      - equal:
          path: metadata.annotations["azure.workload.identity/client-id"]
          value: 00000000-0000-0000-0000-000000000002

  - it: adds expected env and secret refs to migration job
    release:
      namespace: dev
    set:
      service: test-service
      database.principalName: test-service-principal
      database.databaseNames[0]: imports
      database.migrations.enabled: true
      database.migrations.image: test/migrations:1.0.0
      database.migrations.clientId: 00000000-0000-0000-0000-000000000002
      serviceBus.enabled: true
      externalSecret.enabled: true
      redis.enabled: true
      search.enabled: true
      search.serviceName: search-service
      search.principalName: search-principal
      search.subscriptionId: 00000000-0000-0000-0000-000000000003
      search.resourceGroupName: rg-dev
      storage.accountName: mystorage
    documentIndex: 1
    asserts:
      - isKind:
          of: Job
      - equal:
          path: spec.template.spec.serviceAccountName
          value: test-service-migrations
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: test-service-servicebus
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: test-service-secrets
              optional: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_SEARCH_SERVICE_NAME
            value: search-service
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_STORAGE_ACCOUNT_NAME
            value: mystorage
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MANAGED_IDENTITY_USER
            value: test-service-principal

  - it: renders AZURE_SEARCH_DB_CONNECTION_STRING env var for each database
    release:
      namespace: dev
    set:
      service: test-service
      database.principalName: test-service-principal
      database.databaseNames[0]: imports
      database.migrations.enabled: true
      database.migrations.image: test/migrations:1.0.0
      database.migrations.clientId: 00000000-0000-0000-0000-000000000002
      search.enabled: true
      search.subscriptionId: 00000000-0000-0000-0000-000000000003
      search.resourceGroupName: rg-dev
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_SEARCH_DB_CONNECTION_STRING_IMPORTS
            value: "Encrypt=True;Connection Timeout=30;Database=imports;ResourceId=/subscriptions/00000000-0000-0000-0000-000000000003/resourceGroups/rg-dev/providers/Microsoft.Sql/servers/devimpdbssq1401;"

  - it: renders AZURE_SEARCH_USER_ASSIGNED_IDENTITY env var
    release:
      namespace: dev
    set:
      service: test-service
      database.principalName: test-service-principal
      database.databaseNames[0]: imports
      database.migrations.enabled: true
      database.migrations.image: test/migrations:1.0.0
      database.migrations.clientId: 00000000-0000-0000-0000-000000000002
      search.enabled: true
      search.principalName: search-principal
      search.subscriptionId: 00000000-0000-0000-0000-000000000003
      search.resourceGroupName: rg-dev
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_SEARCH_USER_ASSIGNED_IDENTITY
            value: "/subscriptions/00000000-0000-0000-0000-000000000003/resourcegroups/rg-dev/providers/Microsoft.ManagedIdentity/userAssignedIdentities/search-principal"
