apiVersion: managedidentity.azure.com/v1api20230131
kind: UserAssignedIdentity
metadata:
  name: {{ include "webapp.azure.serviceManagedIdentityName" . }}
  labels:
    {{- include "ipaffs-common.labels" . | nindent 4 }}
  annotations:
    serviceoperator.azure.com/reconcile-policy: manage
spec:
  location: {{ .Values.azure.location }}
  owner:
    name: {{ template "ipaffs-common.azure.resourceGroup" . }}

{{- if .Values.database.migrations.enabled }}
---
apiVersion: managedidentity.azure.com/v1api20230131
kind: UserAssignedIdentity
metadata:
  name: {{ include "webapp.azure.migrationsManagedIdentityName" . }}
  labels:
    {{- include "ipaffs-common.labels" . | nindent 4 }}
  annotations:
    serviceoperator.azure.com/reconcile-policy: manage
spec:
  location: {{ .Values.azure.location }}
  owner:
    name: {{ template "ipaffs-common.azure.resourceGroup" . }}
{{- end }}

